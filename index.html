  { id:'c15', cat:'COC Benefits & Risks', q:'List the medical contraindications to combined oral contraceptive use.', a:'- Known or history of deep venous thrombosis or pulmonary embolism\n- History of stroke, coronary artery disease, or ischemic heart disease\n- Diabetes with microvascular complications, duration over 20 years, or age over 35\n- History of estrogen-dependent cancer, including breast cancer\n- Current pregnancy\n- Migraines with aura, focal neurological symptoms, or vascular risk after age 35\n- Smoking more than 20 cigarettes a day and age over 35\n- Untreated hypertension greater than 160/100 or with vascular disease\n- Liver disease\n- Major surgery with prolonged immobilization or leg surgery\n- Personal or family history of hypercoagulable disorder\n- Less than 2 weeks postpartum\n- Systemic lupus erythematosus\n- Hypertriglyceridemia' },
  { id:'c16', cat:'COC Benefits & Risks', q:'Besides the medical contraindications, what other client factors should prompt caution before prescribing a hormonal contraceptive?', a:'Being on anticoagulants or having a blood clotting disorder, a history of severe depression, diabetes, high blood pressure, or irregular periods spaced at long intervals.' },
  { id:'c17', cat:'COC Benefits & Risks', q:'What does the doctor evaluation include before starting a hormonal contraceptive?', a:'Taking a medical history, measuring weight and blood pressure, and performing a breast check, pelvic exam, and Pap smear.' },

  { id:'c18', cat:'Combined Oral Contraceptives', q:'What is a combined oral contraceptive, and what are the two types by hormone pattern?', a:'A preparation of synthetic oestrogen and progestagen highly effective at preventing pregnancy. Monophasic pills give a fixed hormone concentration throughout the cycle; multiphasic pills vary the concentration in 2 (biphasic) or 3 (triphasic) steps.' },
  { id:'c19', cat:'Combined Oral Contraceptives', q:'Describe the two packet formats COCs are available in.', a:'A 21-pill pack, taken daily for 21 days followed by a 7-day pill-free break; or a pack where a hormone pill is taken daily for 21 days followed by 7 placebo pills instead of a break.' },

  { id:'c20', cat:'Progestagen-Only Pill (POP)', q:'What distinguishes the progestagen-only pill (POP) from the combined pill, and what progestagen dose does it contain?', a:'It contains only a progestagen, at a tenth to a half the dose used in combined pills (0.03 to 0.6 mg, depending on the progestagen type), and comes from the norethisterone or levonorgestrel groups.' },
  { id:'c21', cat:'Progestagen-Only Pill (POP)', q:'How is the POP taken, and how does its effectiveness compare with the COC?', a:'It is taken every day at the same time (within a 2 to 4 hour window), without a break, regardless of bleeding pattern. It is slightly less effective than the COC, especially in younger women, but similar in effectiveness to the COC in women over 35.' },
  { id:'c22', cat:'Progestagen-Only Pill (POP)', q:'What common side effects may occur with the pill, and when do they typically resolve?', a:'Breakthrough bleeding, breast tenderness, headaches, bloating, nausea, weight change, and mood changes; these usually resolve after 2 to 6 months as the body adjusts.' },
  { id:'c23', cat:'Progestagen-Only Pill (POP)', q:'What does the ACHES acronym stand for, and what does it represent?', a:'Abdominal pain (severe) or yellow skin/eyes, Chest pain (severe), Headaches (severe), Eye problems, and Severe leg pain or swelling — the warning signs of a serious pill-related problem that should prompt contacting a health provider immediately.' },

  { id:'c24', cat:'Injectables (Depo Provera)', q:'How often is the Depo Provera shot given, and by whom?', a:'Every 12 weeks (4 times a year), given by a trained health care provider in the arm or buttock.' },
  { id:'c25', cat:'Injectables (Depo Provera)', q:'How does the timing of the first Depo shot affect the need for back-up contraception?', a:'If given during the first 5 days of the period, protection is immediate. If given at another time, a back-up method such as condoms is needed for 7 days.' },
  { id:'c26', cat:'Injectables (Depo Provera)', q:'List the common side effects of Depo Provera and when they typically resolve.', a:'Irregular bleeding, changes in period pattern, and weight gain, which usually resolve during the first 6 to 12 months as the body adjusts.' },
  { id:'c27', cat:'Injectables (Depo Provera)', q:'List the less common side effects of Depo Provera.', a:'Mood changes (irritability), tiredness, headache, vaginal dryness, increased or decreased sex drive, and hair loss.' },
  { id:'c28', cat:'Injectables (Depo Provera)', q:'Which warning signs on Depo Provera should prompt contacting a health provider?', a:'Heavy vaginal bleeding, frequent very painful headaches, severe belly pain, and depression.' },
  { id:'c29', cat:'Injectables (Depo Provera)', q:'List the benefits of Depo Provera.', a:'Very effective (more so than the pill), long-lasting (only 4 visits a year), lighter or absent periods after 8 to 12 months, less menstrual pain, no daily pills, private, and safe for women who cannot take estrogen.' },
  { id:'c30', cat:'Injectables (Depo Provera)', q:'List the disadvantages of Depo Provera.', a:'No protection against HIV or other STIs, requires a clinic visit every 12 weeks, has a long-lasting effect that cannot be reversed immediately, and is not recommended for women with osteoporosis.' },

  { id:'c31', cat:'Emergency Contraception', q:'What is emergency contraception (EC), and what is the maximum window for use after unprotected sex?', a:'A special, stronger dose of birth control pills used to prevent pregnancy after unprotected sex; it can be used up to 5 days (120 hours) after intercourse, though sooner is better. It is not an abortion pill.' },
  { id:'c32', cat:'Emergency Contraception', q:'Name the two kinds of EC available and describe the dosing schedule.', a:'Progestin-only pills (such as Plan B) and combined estrogen/progestin pills (such as Preven); both are taken as two doses, the first as soon as possible within 5 days, and the second exactly 12 hours after the first.' },
  { id:'c33', cat:'Emergency Contraception', q:'What is the most common side effect of EC, and how can nausea be minimized?', a:'Nausea, lasting about a day; it can be minimized by choosing the progestin-only EC (less nausea than the combined type), eating food such as bread or crackers about 30 minutes before taking EC, or taking anti-nausea medicine 1 to 2 hours beforehand (which can cause drowsiness).' },
  { id:'c34', cat:'Emergency Contraception', q:'List the benefits and disadvantages of emergency contraception.', a:'Benefits: prevents pregnancy up to 120 hours after sex, no long-lasting side effects, safe for almost all women, and can be kept on hand. Disadvantages: less effective than regular methods like the pill or condoms, an increased relative risk of ectopic pregnancy if EC fails, and no protection against HIV or other STIs.' },

  { id:'c35', cat:'Transdermal Patch', q:'How does the contraceptive patch work, and how often is it changed?', a:'It releases hormones similar to those in birth control pills through the skin into the bloodstream. A new patch is applied once a week.' },
  { id:'c36', cat:'Transdermal Patch', q:'Describe the patch application cycle over 4 weeks.', a:'A new patch is applied each week for 3 weeks in a row (3 patches total), then no patch is worn during week 4 (the Patch Free Week), during which the period occurs; a new 4-week cycle then starts even if still bleeding.' },
  { id:'c37', cat:'Transdermal Patch', q:'Where on the body can the patch be applied?', a:'The outer upper arm, the upper body (front or back), the buttocks, or the belly — never the breasts.' },
  { id:'c38', cat:'Transdermal Patch', q:'What is the maximum number of days a woman should go without wearing a patch?', a:'7 days.' },
  { id:'c39', cat:'Transdermal Patch', q:'List the benefits and a key disadvantage of the patch related to body weight.', a:'Benefits: as effective as the pill, no daily dosing, regular lighter and shorter periods, and does not interrupt sex. Disadvantage: it is less effective in women who weigh 198 pounds (about 90 kg) or more, and it does not protect against HIV or other STIs.' },

  { id:'c40', cat:'Vaginal Contraceptive Ring', q:'How does the vaginal contraceptive ring (NuvaRing) work, and how long is each ring worn?', a:'It releases hormones similar to those in birth control pills into the body through the vagina; each ring is worn continuously for 3 weeks, followed by a Ring Free Week during which the period occurs.' },
  { id:'c41', cat:'Vaginal Contraceptive Ring', q:'When is a new ring inserted after the Ring Free Week, and what is the maximum time without a ring?', a:'A new ring is inserted exactly 1 week after the old one was removed, even if still bleeding; a woman should never go more than 7 days without a ring.' },
  { id:'c42', cat:'Vaginal Contraceptive Ring', q:'List the benefits of the vaginal ring.', a:'As effective as the pill, no daily pills, regular lighter and shorter periods, a very low hormone dose, private, and it can be used to skip periods under provider guidance.' },

  { id:'c43', cat:'Subdermal Implants', q:'Compare Norplant and Implanon as subdermal implant systems.', a:'Norplant was a set of 6 small levonorgestrel-filled capsules but is no longer produced; Implanon, a single-rod system, is now used in its place.' },
  { id:'c44', cat:'Subdermal Implants', q:'How quickly does the implant become effective, and by what mechanisms does it prevent pregnancy?', a:'It becomes effective within 24 hours of implantation. The released progestin thickens cervical mucus to block sperm, may suppress ovulation, and thins the uterine lining to hinder implantation.' },
  { id:'c45', cat:'Subdermal Implants', q:'What is the duration of protection offered by implants, and are they safe during breastfeeding?', a:'Continuous protection for up to five years; they are safe for women who are breastfeeding.' },
  { id:'c46', cat:'Subdermal Implants', q:'List the side effects and complications associated with implants.', a:'Menstrual disturbances and irregularities, headaches or migraines, increased acne, weight gain, nausea, anxiety, unwanted hair growth or loss, ovarian cysts, and an increased risk of ectopic pregnancy, which is a medical emergency if it occurs.' },

  { id:'c47', cat:'Intrauterine Device (IUD)', q:'What is the IUD, and what two substances can modern IUDs release to increase effectiveness?', a:'A small, T-shaped, flexible plastic device placed inside the uterus; modern IUDs release either copper or progestin.' },
  { id:'c48', cat:'Intrauterine Device (IUD)', q:'What precautions and follow-up are needed after IUD insertion?', a:'Avoid putting anything in the vagina for the first 5 to 7 days, call the clinic for fever or unusual pain/bleeding, return for a follow-up visit 4 to 6 weeks after insertion, and check the IUD string weekly for the first few months, then monthly thereafter.' },
  { id:'c49', cat:'Intrauterine Device (IUD)', q:'How does timing of IUD insertion affect the need for back-up contraception?', a:'Insertion during the period gives immediate protection; insertion at another time requires a back-up method such as condoms for 7 days.' },
  { id:'c50', cat:'Intrauterine Device (IUD)', q:'How do periods typically change with the copper IUD versus the progestin IUD?', a:'The copper IUD (hormone-free) keeps periods regular but a few days longer and heavier than usual. The progestin IUD causes irregular bleeding and cramping in the first 3 to 6 months, then shorter, lighter, less painful periods by 1 year, with one in five women having no period after a year; periods return to normal after removal.' },
  { id:'c51', cat:'Intrauterine Device (IUD)', q:'What side effects are specific to the progestin IUD, beyond bleeding pattern changes?', a:'Moodiness, headaches, and skin changes, because it releases a hormone.' },
  { id:'c52', cat:'Intrauterine Device (IUD)', q:'List the benefits of the IUD, including its duration by type.', a:'Very effective, more so than the pill; long-lasting, 5 years for the progestin IUD and 10 years for the copper IUD; easy to use, requiring only a monthly string check; a good option for women with at least one child; and usable while breastfeeding.' },
  { id:'c53', cat:'Intrauterine Device (IUD)', q:'What are the disadvantages of the IUD, and what warning signs suggest a serious problem?', a:'It does not protect against HIV or other STIs, requires a trained provider for insertion and removal, and insertion can be uncomfortable. The most serious problem is uterine infection, signaled by severe belly pain or cramps, deep pain during sex, severe chills, bad-smelling vaginal discharge, or very heavy bleeding.' },
];


/* ===================================================================
   Flashcard data — Infertility & the Pharmacist Role
   =================================================================== */
window.INFERTILITY_CARDS = [
  { id:'i1', cat:'Infertility Foundations', q:'Define infertility, and how does it differ from sterility?', a:'Infertility is an inability to achieve pregnancy despite regular unprotected intercourse, usually for a period of 1 year. Sterility is more definite and absolute, referring to an irreversible state, whereas infertility (sometimes called childlessness) is not necessarily permanent.' },
  { id:'i2', cat:'Infertility Foundations', q:'What proportion of couples with regular unprotected intercourse achieve pregnancy at 6, 12, and 18 to 24 months?', a:'About 60% achieve pregnancy within 6 months, 90% within 12 months, and 95% within 18 to 24 months.' },

  { id:'i3', cat:'Epidemiology', q:'Describe the geographic extent of the recognized infertility belt in Africa.', a:'It extends from West African countries (Senegal, Mali, Burkina Faso, Niger, and northern Nigeria) through Cameroon, Gabon, Congo, Zaire, Zambia, Central African Republic, and southwest Sudan, to East African countries (Uganda, southwestern Kenya, Ethiopia, and Tanzania).' },
  { id:'i4', cat:'Epidemiology', q:'How does the African infertility belt relate to the AIDS belt, and why?', a:'The infertility belt corresponds closely with the AIDS belt, because both infertility and AIDS are associated with sexually transmitted infections.' },
  { id:'i5', cat:'Epidemiology', q:'What is the estimated scope of infertility in Nigeria, and what infertility rate range is seen across developing countries?', a:'Over 800,000 couples in Nigeria are estimated to have difficulty achieving a desired pregnancy. Across developing countries, infertility rates range from 8.6% to 21.5%, with Eastern Africa having the lowest rate and Southern Africa the highest.' },
  { id:'i6', cat:'Epidemiology', q:'What proportion of infertile African women have a diagnosis attributable to a previous STI, and which pathogens are most implicated?', a:'An estimated 85% of infertile African women have a diagnosis attributable to a previous sexually transmitted infection. Gonorrhea and Chlamydia are the most commonly responsible pathogens, with the human papilloma virus also sometimes involved; nearly 75% of infertility in Africa relates to gonorrhea or Chlamydia that has spread to the upper reproductive tract.' },
  { id:'i7', cat:'Epidemiology', q:'What are the major preventable causes of infertility in most developing countries?', a:'Sexually transmitted infections, postpartum infection, and post-abortion infection.' },

  { id:'i8', cat:'Etiology', q:'In what proportion of infertility cases can a cause be identified, and how often is more than one cause present?', a:'A cause can be found in about 90% of cases, though about 10% of couples never learn why they cannot conceive. Between 10% and 30% of cases have more than one contributing cause.' },
  { id:'i9', cat:'Etiology', q:'What is usually responsible for male infertility?', a:'Defects in sperm quantity and quality.' },
  { id:'i10', cat:'Etiology', q:'What is pelvic inflammatory disease (PID), and why is it significant in infertility?', a:'PID is the major cause of infertility worldwide; it is a variety of infections, including gonorrhea and Chlamydia, that affect the reproductive organs, appendix, and parts of the intestine in the pelvic area. The fallopian tube is the site most often implicated, a condition called salpingitis.' },
  { id:'i11', cat:'Etiology', q:'How does endometriosis cause infertility, and how commonly is it implicated?', a:'It accounts for about 5% or more of infertility cases, with some studies citing up to 30%. It develops when fragments of the endometrial lining are carried upward through the tubes and implant elsewhere in the pelvis; these implants respond to hormonal changes, growing with each cycle and eventually causing scarring and inflammation.' },
  { id:'i12', cat:'Etiology', q:'List other recognized causes of female infertility beyond PID and endometriosis.', a:'Hypothalamic-pituitary disorders, polycystic ovarian syndrome, ovarian cysts, premature ovarian failure, luteal phase defect, benign uterine fibroids, surgical adhesions, ectopic pregnancies, certain drugs, inflammatory bowel disease, celiac sprue, epilepsy, thyroid disorders (hyper- and hypothyroidism), and physical damage from intrauterine devices.' },

  { id:'i13', cat:'Pharmacist Role: Prevention', q:'What preventive steps should a pharmacist take to help prevent infertility related to STIs and PID?', a:'- Stay current on preventing, diagnosing, and treating STIs and PID\n- Recognize that contraceptive choice influences PID risk\n- Provide public health education on the consequences of untreated sexual infections\n- Ensure access to early, confidential STI diagnosis and treatment, including for minors\n- Help young people identify STI risk factors\n- Encourage use of condoms, diaphragms, and spermicides alongside other contraceptive methods' },
  { id:'i14', cat:'Pharmacist Role: Prevention', q:'Since IUDs increase PID risk, what precautions should a pharmacist take around IUD recommendation and use?', a:'- Be conservative recommending IUDs to nulliparous women planning children\n- Avoid recommending IUDs to women at higher risk of STIs/PID, especially adolescents\n- Screen for STIs in all patients receiving an IUD\n- Never insert an IUD into a woman with an untreated STI\n- Consider antibiotic prophylaxis in high-STI-incidence areas\n- Treat any vaginal discharge in an IUD user as infection until proven otherwise\n- Ensure clients know the danger signs of pelvic infection and where to seek help' },
  { id:'i15', cat:'Pharmacist Role: Prevention', q:'What should a pharmacist emphasize regarding sterilization and induced abortion?', a:'The permanence of sterilization, since reversal is an expensive procedure with uncertain prognosis, and the risk of infertility from abortions, especially when performed by untrained personnel without adequate hygiene or equipment.' },

  { id:'i16', cat:'Infertility Work-Up', q:'List the situations in which an infertility evaluation should begin promptly rather than advising the couple to wait and see.', a:'- The woman is in her late 30s (fertility declines steeply after 40; women over 35 get priority)\n- The woman has irregular menses, which may signal sporadic ovulation or premature ovarian failure\n- The couple history includes mumps in the man, or repeated miscarriage, ectopic pregnancy, or PID in the woman, or prior pelvic surgery\n- The woman has severe progressive dysmenorrhea or dyspareunia, suggesting endometriosis\n- The woman has a history of IUD use, pelvic infection, or ovarian/tubal/uterine surgery\n- The couple lives in an area with high endemic STI incidence' },
  { id:'i17', cat:'Infertility Work-Up', q:'What basic initial work-up services can a pharmacist provide?', a:'Educating the patients, gathering pertinent historical information, providing a thorough physical examination, and providing a resource for reassurance, counseling, and emotional stability, including referrals as needed.' },
  { id:'i18', cat:'Infertility Work-Up', q:'How should history-taking be structured when counseling an infertile couple?', a:'Interview the couple together first about factors affecting reproductive performance (anatomical, infectious, and toxic), then interview the man and woman separately to obtain confidential information.' },
  { id:'i19', cat:'Infertility Work-Up', q:'What should the physical examination of an infertile woman assess?', a:'Hair distribution and body/breast development for signs of endocrinopathies (hypogonadism, adrenal hyperplasia, hypothyroidism, ovarian dysfunction, hyperprolactinemia), plus a pelvic exam checking for uterine hypoplasia, adnexal tumours, cervical lesions, and whether dyspareunia may be a problem.' },
  { id:'i20', cat:'Infertility Work-Up', q:'What should the physical examination of an infertile man assess?', a:'Sexual characteristics for endocrinopathies such as hypogonadism or Klinefelter syndrome, and a penile exam for hypospadias, phimosis, cysts, cryptorchidism, vas thickening or absence, hydrocele, or varicocele.' },

  { id:'i21', cat:'Counseling & Semen Evaluation', q:'What does fertility counseling typically evaluate?', a:'Fertility awareness techniques and optimal coital timing, screening for asymptomatic STIs, whether ovulation is occurring (via basal body temperature or cervical mucus records), and semen analysis.' },
  { id:'i22', cat:'Counseling & Semen Evaluation', q:'What instructions should a man follow before providing a semen sample for evaluation?', a:'Abstain from ejaculation for at least 3 and no more than 5 days; avoid alcohol or a hot shower/bath just before producing the sample; ejaculate into a small, sterile, dry, wide-mouth jar; deliver it to the laboratory within an hour; and keep it close to body temperature.' },
  { id:'i23', cat:'Counseling & Semen Evaluation', q:'According to WHO criteria, what defines a normal semen sample?', a:'Concentration greater than 20 x 10^6 sperm/mL, greater than 40% progressive motility, greater than 50% normal morphology (forms), greater than 60% viability (alive), no significant agglutination, normal appearance and viscosity of seminal fluid, and less than 10^6 white blood cells/mL.' },
  { id:'i24', cat:'Counseling & Semen Evaluation', q:'Why might more than one semen evaluation be necessary, and what does WHO recommend?', a:'Because a single result, particularly if borderline, may not accurately reflect sperm and semen status; WHO recommends two samples taken at least 2 weeks apart.' },

  { id:'i25', cat:'Management: Male Infertility', q:'How is male infertility due to azospermia or impotence typically managed, and what safety measure is required for donor sperm?', a:'With insemination using donor sperm. The sperm must be frozen and quarantined for 6 months, and only released if the donor remains HIV antibody negative after that period, to avoid transmitting STIs including HIV.' },

  { id:'i26', cat:'Management: Female Infertility', q:'How are cervical mucus problems that impair conception managed?', a:'With insemination or uterine instillation of a small amount of specially prepared sperm.' },
  { id:'i27', cat:'Management: Female Infertility', q:'What is cervical incompetence, and how is it managed?', a:'A condition where the cervix cannot maintain a pregnancy; it is managed with cerclage, bed rest, or both. Cerclage involves passing strong suture material around the cervix like a purse string to prevent premature dilation.' },
  { id:'i28', cat:'Management: Female Infertility', q:'How are ovulation disorders treated, including in women with hyperprolactinemia?', a:'With drugs that induce ovulation, such as clomiphene citrate, which suppresses estrogen suppressive effect on ovulation. In women whose ovulation is suppressed by hyperprolactinemia, drugs that suppress prolactin, such as bromocriptine, may induce ovulation.' },
  { id:'i29', cat:'Management: Female Infertility', q:'How is infertility from significant ovarian damage (torsion, surgical removal, hemorrhagic cyst, or premature menopause) addressed?', a:'Only through high-technology fertility medicine using ova donated from another woman.' },
  { id:'i30', cat:'Management: Female Infertility', q:'How are uterine or tubal abnormalities that cause infertility corrected?', a:'By surgical procedures.' },

  { id:'i31', cat:'High-Technology Approaches', q:'Describe gamete intra-fallopian tube transfer (GIFT) and its typical indication.', a:'A procedure that places a mixture of ova and sperm directly into the fallopian tube; it is used primarily for unexplained infertility where the fallopian tubes appear normal.' },
  { id:'i32', cat:'High-Technology Approaches', q:'Describe the process of in vitro fertilization (IVF).', a:'Mature ova, harvested via laparoscopy or trans-vaginally, are combined with specially prepared sperm in a laboratory culture medium and incubated to allow fertilization; fertilized ova that reach sufficient maturity are placed in the uterus via a trans-cervical catheter.' },
  { id:'i33', cat:'High-Technology Approaches', q:'What do high-technology fertility approaches like GIFT and IVF frequently use to increase the number of ova available for harvest?', a:'Ovulation stimulation drugs.' },

  { id:'i34', cat:'Referrals & Broader Role', q:'When should a pharmacist refer an infertile couple onward, and to whom?', a:'When couples require more specialized care that may need high-technology approaches, they should be referred to infertility specialists or obstetrics and gynecology consultants skilled in fertility issues, ensuring procedures are not duplicated unnecessarily.' },
  { id:'i35', cat:'Referrals & Broader Role', q:'Beyond clinical referral, what other referral option might a pharmacist discuss with an infertile couple?', a:'Referral to adoption agencies or other legal homes for adoption, though this is not common practice in Africa, it may be the only solution for some couples.' },
  { id:'i36', cat:'Referrals & Broader Role', q:'How does a pharmacist providing infertility services contribute to community information and awareness?', a:'By staying current on the epidemiology of infertility and STIs locally, serving as a resource for researchers and epidemiologists, providing accurate statistical data, and acting as an advocate for appropriate political programs at the community or local government level.' },
];

/* ===================================================================
   Flashcard data — PEM, Vitamin & Mineral Deficiency Diseases
   =================================================================== */
window.PEM_CARDS = [
  { id:'p1', cat:'PEM Foundations', q:'What is Protein-Energy Malnutrition (PEM)?', a:'The deficiency of macronutrients or energy and protein in the diet; a spectrum of biological disorders caused by lack of food.' },
  { id:'p2', cat:'PEM Foundations', q:'Despite its name, what underlying deficiency does PEM actually reflect?', a:'PEM does not necessarily mean the individual is experiencing a lack of protein, but rather a deficiency of total energy; dietary proteins that would normally be used for tissue repair or growth are also diverted for use as energy.' },
  { id:'p3', cat:'PEM Foundations', q:'In which populations is PEM typically found?', a:'It is rare in the developed world and is generally associated with children suffering from neglect or malnourished elderly patients, particularly from backward and downtrodden communities usually found in low- and middle-income countries (LMICs).' },

  { id:'p4', cat:'PEM Classification', q:'What are the clinical forms of severe PEM?', a:'Kwashiorkor, marasmus, and marasmic kwashiorkor.' },
  { id:'p5', cat:'PEM Classification', q:'What are the sub-clinical forms of PEM?', a:'Underweight, wasting, and stunting.' },
  { id:'p6', cat:'PEM Classification', q:'How do the treatment and management of kwashiorkor, marasmus, and marasmic kwashiorkor compare?', a:'Children with marasmus, marasmic kwashiorkor, and kwashiorkor all have severe PEM, and the treatment and management of these three forms of severe malnutrition are the same.' },

  { id:'p7', cat:'Kwashiorkor', q:'What does the word kwashiorkor mean, and what age group is most affected?', a:'An African word meaning "disease of the displaced child," who is deprived of adequate nutrition; it mostly occurs in children between the ages of 1 and 3 years, when they are completely weaned off the breast.' },
  { id:'p8', cat:'Kwashiorkor', q:'What are the three essential manifestations or signs of kwashiorkor?', a:'Oedema (swelling of the feet), growth failure, and mental changes.' },
  { id:'p9', cat:'Kwashiorkor', q:'Describe the pattern of oedema in kwashiorkor.', a:'Fluid accumulates in the tissues, usually beginning as slight swelling in the feet that gradually spreads up the legs; later the hands and face may also develop oedema.' },
  { id:'p10', cat:'Kwashiorkor', q:'Describe growth failure in kwashiorkor.', a:'Growth retardation is the earliest manifestation; the child is lighter and shorter than normal peers of the same age, weighing about 80% or less of normal, and is wasted with thin arms and legs, though gross swelling can sometimes make body weight appear relatively higher.' },
  { id:'p11', cat:'Kwashiorkor', q:'Describe the mental changes seen in kwashiorkor.', a:'The child has no interest in the surroundings, is irritable, and prefers to stay at one place and in one position.' },
  { id:'p12', cat:'Kwashiorkor', q:'Describe the hair changes seen in kwashiorkor.', a:'The hair loses its healthy sheen, becomes silkier and thinner, and takes on a coppery red discoloration; small tufts of hair can easily be plucked without causing pain, referred to as easy pluckability.' },
  { id:'p13', cat:'Kwashiorkor', q:'Describe the skin and facial changes seen in kwashiorkor.', a:'Dermatosis (changes in the skin) is common, especially in areas of friction, and moon face may develop, in which the cheeks appear swollen with fluid or fatty tissue and slightly sagging.' },
  { id:'p14', cat:'Kwashiorkor', q:'Which micronutrient deficiencies commonly accompany kwashiorkor?', a:'Almost all affected children manifest some degree of anaemia due to iron deficiency, along with eye signs of vitamin A deficiency and manifestations of vitamin B-complex deficiency.' },

  { id:'p15', cat:'Marasmus', q:'What age group is typically affected by marasmus?', a:'Children below the age of 2 years.' },
  { id:'p16', cat:'Marasmus', q:'List the signs and symptoms of marasmus.', a:'- Extreme muscle wasting, "skin and bones," with very little subcutaneous fat, skin hanging loosely especially over the buttocks\n- Loose and hanging skin folds\n- Aged (old-man) or monkey face\n- Absolute weakness\n- Absence of oedema\n- Frequent diarrhoeal episodes leading to dehydration and micronutrient deficiencies of vitamin A, iron, and B-complex' },
  { id:'p17', cat:'Marasmus', q:'How does the presence of oedema distinguish marasmus from kwashiorkor?', a:'Oedema is absent in marasmus, whereas it is one of the three cardinal features of kwashiorkor.' },

  { id:'p18', cat:'Marasmic Kwashiorkor', q:'What is marasmic kwashiorkor?', a:'A form of severe PEM in which malnourished children exhibit features of both kwashiorkor and marasmus; such changes could occur during the transition from one form of severe PEM to another.' },
  { id:'p19', cat:'Marasmic Kwashiorkor', q:'List the signs and symptoms of marasmic kwashiorkor.', a:'- Extreme muscle wasting of different degrees, "skin and bones"\n- Loose and hanging skin folds\n- Aged (old-man) or monkey-like face\n- Absolute weakness\n- Oedema' },

  { id:'p20', cat:'PEM Management', q:'What are the priorities alongside a balanced diet in managing PEM?', a:'Restoration of diet, and prevention or cure of infection, severe anaemia, hypoglycaemia, and vitamin A deficiency, all of which also have high priority.' },
  { id:'p21', cat:'PEM Management', q:'What energy and protein intakes are recommended for a child with PEM?', a:'Energy: 170 to 200 kcal per kg of body weight. Protein: 3 to 4 g per kg of body weight; both are required in larger quantities than normal.' },
  { id:'p22', cat:'PEM Management', q:'Why is control of infections and infestations a management priority in PEM?', a:'Because infections are the immediate cause of death in many children, appropriate antibiotics should be started immediately, and children with intestinal infestations such as giardiasis and ascariasis should be treated.' },
  { id:'p23', cat:'PEM Management', q:'Why does oral rehydration take first priority in PEM management, and how is mild-to-moderate dehydration treated?', a:'Dehydration is one of the most dangerous complications of PEM due to episodes of diarrhoea; mild-to-moderate dehydration is treated with home-made salt-sugar mixture or commercial oral rehydration solution (ORS), 50 to 100 mL per kg of body weight given in the first 4 to 6 hours in small quantities every few minutes.' },
  { id:'p24', cat:'PEM Management', q:'How is severe dehydration in PEM treated?', a:'With intravenous fluids, specifically Ringer lactate.' },
  { id:'p25', cat:'PEM Management', q:'What mineral and vitamin supplementation is required in severe PEM?', a:'All cases of severe PEM require a multivitamin preparation to meet increased demands during recovery; iron (60 mg) and folic acid (100 mg) may be given daily to correct anaemia, along with potassium and vitamins A, C, B-complex, and D.' },

  { id:'p26', cat:'PEM Prevention & Programmes', q:'What is the aim of supplementary feeding programmes in combating malnutrition, and what guiding principle underlies prevention efforts?', a:'To improve the nutritional status of vulnerable groups through distribution of food supplements, guided by the principle that "prevention is better than cure."' },
  { id:'p27', cat:'PEM Prevention & Programmes', q:'What is the National Community Food Bank Programme?', a:'An initiative launched by the Nigerian Government, through the Office of the First Lady, the Federal Ministry of Health, and the National Primary Health Care Development Agency (NPHCDA), that tackles child malnutrition by increasing access to safe and nutritious food.' },
  { id:'p28', cat:'PEM Prevention & Programmes', q:'What is the Targeted Supplementary Feeding Programme (TSFP), and where does it mainly operate?', a:'A programme backed by the World Food Programme (WFP) and organizations such as the Food and Agriculture Organization (FAO), operating heavily in conflict-affected northern Nigerian states such as Sokoto, Borno, Yobe, and Adamawa.' },
  { id:'p29', cat:'PEM Prevention & Programmes', q:'What other targeted micronutrient supplementation programme is mentioned for young children?', a:'Vitamin A supplementation in children under 5 years of age.' },

  { id:'p30', cat:'Vitamins: History & Basics', q:'What did the scientist Cornelius AP propose about milk in 1905?', a:'That milk contained "some unrecognized substances...in very small quantities that was necessary for normal growth and maintenance."' },
  { id:'p31', cat:'Vitamins: History & Basics', q:'Who is regarded as the father of vitamins, and how did the term vitamine originate?', a:'Casimir F, who in 1912 isolated an organic "factor" (presumably from the liver) that he described as an amine; because the amine was vital to life, he combined the two words to coin the term "vitamine."' },
  { id:'p32', cat:'Vitamins: History & Basics', q:'How are vitamins defined?', a:'Non-energy-producing organic compounds, essential for human metabolism, that must be present, usually in small quantity, in a given diet.' },
  { id:'p33', cat:'Vitamins: History & Basics', q:'What causes vitamin deficiencies to occur?', a:'Inadequate intake, mal-absorption, increased tissue needs, increased excretion, certain genetic abnormalities, and drug-vitamin interactions.' },
  { id:'p34', cat:'Vitamins: History & Basics', q:'What myths have contributed to the over-promotion, over-prescription, and over-use of vitamins?', a:'Beliefs such as "they energize the body," "any physical illness is accompanied by vitamin deficiency," "vitamin intake in diet is marginal," and "vitamins make the skin smooth."' },

  { id:'p35', cat:'Vitamins: Classification', q:'How are vitamins broadly classified, and which vitamins belong to each group?', a:'Fat-soluble vitamins: A, D, E, and K. Water-soluble vitamins: C and the B-complex (B1, B2, B3, B6, B12, and others).' },
  { id:'p36', cat:'Vitamins: Classification', q:'How do the storage and toxicity risks of fat-soluble versus water-soluble vitamins differ?', a:'Fat-soluble vitamins (except K) are stored in the body for a long period and are liable to cause cumulative toxicity following regular ingestion of large amounts; water-soluble vitamins are stored only in meagre quantities, with only little chance of toxicity.' },
  { id:'p37', cat:'Vitamins: Classification', q:'What functional role do water-soluble vitamins typically play in the body?', a:'They usually act as organic co-factors or co-enzymes for specific enzymes, such as vitamin B1 forming thiamine pyrophosphate.' },

  { id:'p38', cat:'Vitamin A', q:'Which compounds make up the vitamin A group?', a:'Retinol, retinal, retinoic acid, and several pro-vitamin A carotenoids, among which beta-carotene is the most important.' },
  { id:'p39', cat:'Vitamin A', q:'List the animal and plant sources of vitamin A.', a:'Animal: fish liver oil, butter, milk, cheese, egg yolk. Plants: yellow-orange, red, and dark green fruits and vegetables such as tomatoes, carrots, spinach, papayas, mangoes, corn, and sweet potato.' },
  { id:'p40', cat:'Vitamin A', q:'What are the recommended dietary allowances (RDA) of vitamin A by group?', a:'Infants and children: 400 to 600 mcg per day. Adults (men and women): 600 to 800 mcg per day. Pregnant or lactating mothers: 1000 to 1200 mcg per day.' },
  { id:'p41', cat:'Vitamin A', q:'How is vitamin A activity expressed, and what are the unit conversions?', a:'As Retinol Equivalent (RE) or International Unit (IU): 1 RE equals 1 mcg of retinol or 6 mcg of beta-carotene; 1 IU equals 0.3 mcg of retinol, 0.34 mcg of retinyl acetate, or 0.6 mcg of beta-carotene.' },
  { id:'p42', cat:'Vitamin A', q:'Explain the role of vitamin A in vision.', a:'Retinal is a component of the light-sensitive chemical rhodopsin, synthesized by rods during dark adaptation (its absence causes night blindness or nyctalopia); a similar chemical, the cone or color pigment, is synthesized by cones (its absence causes color blindness).' },
  { id:'p43', cat:'Vitamin A', q:'How does vitamin A participate in gene transcription?', a:'The retinoic acid form plays an important role in gene transcription or expression, due to its activity as a ligand for nuclear receptors.' },
  { id:'p44', cat:'Vitamin A', q:'List the additional physiological functions of vitamin A beyond vision and gene transcription.', a:'- Immune function\n- Embryonic development, since deficiency is associated with foetal malformation\n- Reproduction, since deficiency decreases spermatogenesis in males and affects fertilization, implantation, and degenerates the ova in females\n- Bone metabolism, since deficiency is associated with poor bone metabolism, especially decreased resorption\n- Skin health\n- Anti-oxidant activity' },
  { id:'p45', cat:'Vitamin A', q:'How is vitamin A, specifically retinoic acid, used therapeutically in dermatology?', a:'Pharmacological retinoid therapeutic agents, such as isotretinoin, are used in the treatment of dermatological disorders such as acne.' },
  { id:'p46', cat:'Vitamin A', q:'List the causes of vitamin A deficiency.', a:'- Dietary insufficiency of vitamin A or its precursor\n- Interference with absorption from the intestine, due to diarrhoea, mal-absorption syndrome, or bile salt deficiency\n- Defects in transport due to protein malnutrition (kwashiorkor)\n- Defects in storage due to liver disease' },
  { id:'p47', cat:'Vitamin A', q:'List the ocular manifestations of vitamin A deficiency.', a:'- Xerophthalmia, excessive dryness of the conjunctiva and cornea\n- Night blindness (nyctalopia), from defective rhodopsin formation, which can lead to total blindness\n- Conjunctival xerosis (dryness), which can lead to conjunctival thickening and pigmentation\n- Corneal xerosis, a dry appearance of the cornea which can lead to corneal ulceration' },
  { id:'p48', cat:'Vitamin A', q:'What doses of vitamin A are used for prophylaxis versus treatment of established deficiency?', a:'Prophylaxis to prevent deficiency during infancy, pregnancy, lactation, hepato-biliary disease, or steatorrhoea: 3000 to 5000 IU per day. Treatment of established vitamin A deficiency: 50,000 to 100,000 IU intramuscularly or orally for 1 to 3 days.' },
  { id:'p49', cat:'Vitamin A', q:'List the notable interactions involving vitamin A.', a:'- Vitamin E promotes storage and utilization of retinol and decreases its toxicity\n- Regular use of liquid paraffin can result in vitamin A deficiency\n- Long-term oral neomycin induces steatorrhoea, which interferes with vitamin A absorption' },

  { id:'p50', cat:'Vitamin E', q:'What are the sources of vitamin E, and which tocopherol form is most abundant?', a:'Wheat-germ oil, cereals, nuts, spinach, and egg yolk; alpha-tocopherol is the most abundant form of the tocopherols, with beta, gamma, and delta being other forms.' },
  { id:'p51', cat:'Vitamin E', q:'What is the unit conversion for vitamin E activity?', a:'1 mg of alpha-tocopherol (alpha-tocopherol equivalent) equals 1.49 IU of the natural form of vitamin E.' },
  { id:'p52', cat:'Vitamin E', q:'What is the main mechanism of action of vitamin E?', a:'It essentially acts as an anti-oxidant, protecting unsaturated lipids in cell membranes, coenzyme Q, and other components from free radical oxidation damage, hence preventing generation of toxic products.' },
  { id:'p53', cat:'Vitamin E', q:'What clinical conditions are associated with vitamin E deficiency?', a:'There is no clear-cut deficiency syndrome in humans, but deficiency is implicated in recurrent abortion, haemolytic anaemia, and degenerative changes in the spinal cord, skeletal muscles, and heart.' },
  { id:'p54', cat:'Vitamin E', q:'What supplemental dose of vitamin E is given to at-risk patients, and why?', a:'10 to 30 mg per day, given because primary vitamin E deficiency does not occur clinically, so only supplemental doses are sometimes given to patients at risk.' },
  { id:'p55', cat:'Vitamin E', q:'List the conditions in which vitamin E supplementation has been used or promoted.', a:'G6PD deficiency (to increase erythrocyte survival time), hypervitaminosis A, nocturnal muscle cramps, intermittent claudication, fibrocystic breast disease, acanthocytosis, recurrent abortion, sterility, menopausal syndrome, toxaemia of pregnancy, atherosclerosis, ischaemic heart disease, and prevention of neurodegenerative disorders.' },

  { id:'p56', cat:'Vitamin D', q:'What is vitamin D, and which minerals does it help the intestine absorb?', a:'A group of fat-soluble secosteroids responsible for enhancing intestinal absorption of calcium, iron, magnesium, phosphate, and zinc.' },
  { id:'p57', cat:'Vitamin D', q:'Which two forms of vitamin D are most important in humans, and what are the other recognized forms?', a:'D3 (cholecalciferol) and D2 (ergocalciferol) are most important; others are D1 (ergocalciferol with lumisterol, 1:1), D4 (22-dihydroergocalciferol), and D5 (sitocalciferol).' },
  { id:'p58', cat:'Vitamin D', q:'Why are dark-skinned people less efficient at synthesizing vitamin D, and what is its major source?', a:'Melanin in the skin hinders vitamin D synthesis; the major source is synthesis in the skin on exposure to sunlight, especially for D3, along with diet, supplements, mushrooms, cod liver oil, egg yolk, and intestinal synthesis.' },
  { id:'p59', cat:'Vitamin D', q:'Describe rickets.', a:'A childhood disease characterized by impeded growth and soft, weak, deformed long bones that bend and bow under body weight as children start to walk, occurring as a sequel to calcium or phosphorous deficiency.' },
  { id:'p60', cat:'Vitamin D', q:'Describe osteomalacia.', a:'A disease in adults that results from vitamin D deficiency, characterized by bone fragility and increased risk of fracture.' },
  { id:'p61', cat:'Vitamin D', q:'List proposed uses of vitamin D beyond bone health, noting their evidence strength.', a:'- Reducing risk of death in the elderly (debatable)\n- Prevention of osteoporosis (no good evidence)\n- Reduction of cancer risk (inconsistent evidence)\n- Boosting the immune system\n- Prevention of gestational diabetes and pre-eclampsia in pregnancy' },

  { id:'p62', cat:'Vitamin B1 (Thiamine)', q:'What are the sources of vitamin B1 (thiamine, aneurine)?', a:'Cereals (polished rice), pulses, nuts, green vegetables, yeast, egg, and meat.' },
  { id:'p63', cat:'Vitamin B1 (Thiamine)', q:'What is the mechanism of action of vitamin B1?', a:'It is converted in the body to thiamine pyrophosphate, which acts as a co-enzyme in carbohydrate metabolism; it also plays roles in neuromuscular transmission.' },
  { id:'p64', cat:'Vitamin B1 (Thiamine)', q:'Describe dry beri-beri.', a:'A form of thiamine deficiency characterized mainly by neurological symptoms: tingling, polyneuritis with numbness, hyperesthesia, muscular weakness and atrophy resulting in "wrist drop" or "foot drop," paralysis of the whole limb, sluggishness, poor memory, loss of appetite, and constipation.' },
  { id:'p65', cat:'Vitamin B1 (Thiamine)', q:'Describe wet beri-beri.', a:'A form of thiamine deficiency consisting mainly of cardiovascular effects, such as palpitation, breathlessness, high cardiac output, and ECG changes.' },
  { id:'p66', cat:'Vitamin B1 (Thiamine)', q:'List the therapeutic uses of vitamin B1.', a:'- Prophylactically in infants, pregnant women, and chronic diarrhoea\n- Treatment of beri-beri\n- Acute alcoholic intoxication, which causes decreased B1 absorption\n- Neurological and cardiovascular disorders' },

  { id:'p67', cat:'Vitamin B2 (Riboflavin)', q:'What are the sources of vitamin B2?', a:'Milk, egg, liver, green leafy vegetables, and grains.' },
  { id:'p68', cat:'Vitamin B2 (Riboflavin)', q:'Describe the absorption, storage, and excretion of vitamin B2.', a:'It is well absorbed by active transport and phosphorylated in the intestine, is not significantly stored in the body, and is excreted unchanged in urine.' },
  { id:'p69', cat:'Vitamin B2 (Riboflavin)', q:'List the deficiency symptoms of vitamin B2 (ariboflavinosis).', a:'Sore tongue, lips, and throat; ulcers in the mouth (canker sores); dry, scaly skin; loss of hair; anaemia; and neuropathy.' },
  { id:'p70', cat:'Vitamin B2 (Riboflavin)', q:'What clinical signs characterize ariboflavinosis, and how is it treated?', a:'Dry lips and a magenta tongue characterize it, arising from inadequate intake of B2; it is treated to prevent and treat ariboflavinosis or hyporiboflavinosis, usually together with other B vitamins.' },

  { id:'p71', cat:'Vitamin B3 (Niacin)', q:'What are the alternate names and historical term for vitamin B3?', a:'Nicotinic acid and nicotinamide; it used to be termed the "pellagra preventing factor."' },
  { id:'p72', cat:'Vitamin B3 (Niacin)', q:'What are the sources of vitamin B3, and what precursor relationship exists with tryptophan?', a:'Liver, fish, meat, cereal husk, nuts, and pulses; the amino acid tryptophan is partially converted in the body to nicotinic acid and is hence considered a provitamin (60 mg tryptophan equals 1 mg nicotinic acid).' },
  { id:'p73', cat:'Vitamin B3 (Niacin)', q:'Why do maize eaters commonly suffer from pellagra?', a:'Maize flour is poor in tryptophan and is also believed to contain a niacin antagonist.' },
  { id:'p74', cat:'Vitamin B3 (Niacin)', q:'List the "4 Ds" of pellagra.', a:'- Dermatitis, rashes on the hands, legs, and face with thick, scaly, or cracked skin\n- Diarrhoea, including enteritis, stomatitis, glossitis, salivation, nausea, and vomiting\n- Dementia, including hallucination, insomnia, and amnesia\n- Death' },
  { id:'p75', cat:'Vitamin B3 (Niacin)', q:'What are the prophylactic and treatment doses of niacin for pellagra, and what other conditions is it used for?', a:'Prophylaxis in people at risk: 20 to 50 mg per day orally. Treatment of pellagra: 200 to 500 mg per day in divided doses, orally or parenterally. It is also used in peripheral vascular disease and in hyperlipidemia.' },

  { id:'p76', cat:'Vitamin B5 (Pantothenic Acid)', q:'What are the sources and absorption route of vitamin B5?', a:'Meat, whole grain, vegetables, cereals, groundnuts, mushrooms, rice, wheat, yeast, and fish; it is absorbed from the GI tract by an active transport system.' },
  { id:'p77', cat:'Vitamin B5 (Pantothenic Acid)', q:'What are the symptoms of vitamin B5 deficiency?', a:'Deficiency is very rare but may include irritability, fatigue, and apathy; neurological symptoms may include numbness, paresthesia, and muscle cramps; others may include hypoglycemia and adrenal insufficiency.' },
  { id:'p78', cat:'Vitamin B5 (Pantothenic Acid)', q:'List the therapeutic uses of vitamin B5.', a:'- Diabetic foot ulceration\n- Hyperlipidemia, having a hypolipidemic effect\n- Enhancing wound healing by increasing cell proliferation\n- In cosmetics, to prevent loss of hair color or skin irritation' },

  { id:'p79', cat:'Vitamin B6 (Pyridoxine)', q:'What are the three related forms of vitamin B6, and what are its sources?', a:'Pyridoxine, pyridoxal, and pyridoxamine; sources include liver, meat, egg, soybeans, vegetables, and grain.' },
  { id:'p80', cat:'Vitamin B6 (Pyridoxine)', q:'What are the symptoms of vitamin B6 deficiency?', a:'Deficiency usually occurs together with that of other B vitamins; symptoms may include seborrheic dermatitis, glossitis, growth retardation, mental confusion, convulsion, and anaemia.' },
  { id:'p81', cat:'Vitamin B6 (Pyridoxine)', q:'What prophylactic dose of vitamin B6 is used, and in whom?', a:'2 to 5 mg daily, used prophylactically in alcoholics, infants, and other patients with B deficiency.' },
  { id:'p82', cat:'Vitamin B6 (Pyridoxine)', q:'How is vitamin B6 used to manage drug-induced neurological disturbances?', a:'10 to 50 mg per day, used to prevent and treat isoniazid-, hydralazine-, and cycloserine-induced neurological disturbances.' },
  { id:'p83', cat:'Vitamin B6 (Pyridoxine)', q:'What other specific uses does vitamin B6 have, including in rare genetic disorders?', a:'50 mg daily to treat mental symptoms in women on oral contraceptives; 50 to 200 mg per day for rare genetic disorders such as pyridoxine-responsive anaemia (due to defective haem synthesis) and homocystinuria; and for convulsion in infants and children.' },

  { id:'p84', cat:'Vitamin B7 (Biotin)', q:'What are the sources of biotin?', a:'Nuts, green vegetables, egg yolk, and liver; supplements are also available.' },
  { id:'p85', cat:'Vitamin B7 (Biotin)', q:'List the deficiency symptoms of biotin.', a:'Alopecia, conjunctivitis, seborrheic dermatitis, diabetes, and neurological disturbances such as lethargy and hallucination.' },
  { id:'p86', cat:'Vitamin B7 (Biotin)', q:'What non-nutritional industrial use does biotin have?', a:'It is widely used in biotechnology industries to conjugate proteins for biochemical assays such as Enzyme-Linked Immunosorbent Assay (ELISA).' },

  { id:'p87', cat:'Vitamin B12 (Cobalamin)', q:'What is the main physiological role of vitamin B12?', a:'It is needed to produce an adequate amount of healthy red blood cells in the bone marrow.' },
  { id:'p88', cat:'Vitamin B12 (Cobalamin)', q:'What are the dietary sources of vitamin B12?', a:'It is available only in animal foods, such as meat and dairy products, or yeast extracts, such as brewer yeast.' },
  { id:'p89', cat:'Vitamin B12 (Cobalamin)', q:'What condition results from vitamin B12 deficiency, and how is it defined?', a:'Pernicious anemia; vitamin B12 deficiency is defined by low levels of stored B12 in the body that can result in a lower-than-normal number of red blood cells.' },
  { id:'p90', cat:'Vitamin B12 (Cobalamin)', q:'List the symptoms of vitamin B12 deficiency.', a:'Numbness and tingling in the hands and feet, difficulty walking, muscle weakness, irritability, memory loss, dementia, depression, and psychosis.' },

  { id:'p91', cat:'Vitamin C (Ascorbic Acid)', q:'What are the sources of vitamin C?', a:'Citrus fruits (lemon, oranges) and blackcurrant are the major sources; others are tomato, potato, cabbage, and other vegetables. Human milk is richer in vitamin C than cow milk.' },
  { id:'p92', cat:'Vitamin C (Ascorbic Acid)', q:'List the metabolic actions of vitamin C.', a:'It plays a role in many oxidative and other metabolic reactions, such as conversion of folic acid to folinic acid, and biosynthesis of adrenal steroids, catecholamines, oxytocin, and vasopressin.' },
  { id:'p93', cat:'Vitamin C (Ascorbic Acid)', q:'Describe scurvy and the population most affected.', a:'Severe vitamin C deficiency, mostly seen in malnourished infants, children, the elderly, alcoholics, and drug addicts, and historically common among sailors; common symptoms include anemia, gingivitis causing red, soft, tender gums that bleed easily, tooth decay, and skin haemorrhages.' },
  { id:'p94', cat:'Vitamin C (Ascorbic Acid)', q:'What doses of vitamin C are used for prevention versus treatment of scurvy?', a:'Prevention of deficiency in individuals at risk and in infants: 100 mg per day. Treatment of scurvy: 0.5 to 1.5 g per day.' },
  { id:'p95', cat:'Vitamin C (Ascorbic Acid)', q:'What is the role of vitamin C in post-operative care and wound healing?', a:'500 mg daily post-operatively; it does not itself enhance healing, but suboptimal healing can be guarded against, and it has also been found to accelerate healing of bed sores and chronic leg ulcers.' },
  { id:'p96', cat:'Vitamin C (Ascorbic Acid)', q:'How is vitamin C used in anaemia and urinary tract infections?', a:'In anaemia, it enhances iron absorption and is frequently combined with ferrous salts; for acidification of urine in UTIs, it is given as 1 g three to four times daily (tds/qid).' },
  { id:'p97', cat:'Vitamin C (Ascorbic Acid)', q:'What other conditions have high-dose vitamin C been tried for, with what result?', a:'Common cold, infertility, atherosclerosis, psychological symptoms, asthma, and cancers, but results have remained inconsistent.' },

  { id:'p98', cat:'Mineral Deficiencies Overview', q:'How are dietary minerals classified by the amount required?', a:'Macrominerals, needed in large amounts, such as calcium, magnesium, potassium, chlorine, phosphorus, sodium, and sulphur; and trace minerals or elements, needed in small amounts, such as copper, chromium, cobalt, fluoride, iodine, zinc, iron, manganese, and selenium.' },

  { id:'p99', cat:'Calcium', q:'What body functions is calcium essential for?', a:'The maintenance of normal bones and teeth, normal blood clotting, normal muscle and nervous system function, and normal function of digestive enzymes.' },
  { id:'p100', cat:'Calcium', q:'What are the dietary sources of calcium?', a:'Milk, cheese, and other dairy foods, and green leafy vegetables such as curly kale and okra, but not spinach.' },
  { id:'p101', cat:'Calcium', q:'List the deficiency symptoms of calcium.', a:'- Knocked knees or bowed legs\n- Bones that break or fracture easily\n- Poor posture and tooth decay\n- Pain in the bones of the legs and lower back' },

  { id:'p102', cat:'Magnesium', q:'In how many enzyme systems does magnesium act as a cofactor, and what processes does it regulate?', a:'More than 300 enzyme systems, regulating protein synthesis (synthesis of DNA, RNA, and the antioxidant glutathione), active transport of calcium and potassium ions across cell membranes (nerve impulse conduction, muscle contraction, and normal heart rhythm), blood glucose control (energy production, oxidative phosphorylation, and glycolysis), and blood pressure regulation.' },
  { id:'p103', cat:'Magnesium', q:'What are the sources of magnesium, and what proportion is typically absorbed?', a:'Green leafy vegetables, legumes, nuts, seeds, whole grains, certain beverages, and fortified foods such as breakfast cereals; approximately 30% to 40% of the magnesium obtained from food and beverages is absorbed by the body.' },
  { id:'p104', cat:'Magnesium', q:'What are the early signs and symptoms of magnesium deficiency?', a:'Loss of appetite, nausea, vomiting, fatigue, and weakness.' },
  { id:'p105', cat:'Magnesium', q:'What symptoms occur as magnesium deficiency progresses, and what condition is it also attributed to?', a:'Numbness, muscle contractions and cramps, seizures, abnormal heart rhythms, and coronary spasms; low levels of magnesium are also attributed to migraines.' },

  { id:'p106', cat:'Iodine', q:'List the deficiency symptoms of iodine.', a:'Goitre or swelling in the neck, flabby muscles, dry skin, and in severe deficiency, stunted growth (cretinism) and mental retardation.' },
  { id:'p107', cat:'Iodine', q:'How can iodine deficiency be prevented?', a:'Use of iodized salt can prevent deficiency of iodine.' },

  { id:'p108', cat:'Zinc', q:'What are the sources of zinc?', a:'Red meat, lobster, oyster, liver, groundnuts, wheat, beans, various seeds, and blackcurrant.' },
  { id:'p109', cat:'Zinc', q:'What are the physiological functions of zinc?', a:'It has antioxidant properties that may protect against accelerated aging of the skin and muscles of the body, helps speed up the healing process after an injury, and is beneficial to the body immune system.' },
  { id:'p110', cat:'Zinc', q:'What is the therapeutic role of zinc in gastroenteritis?', a:'Ingestion of zinc strongly stops gastroenteritis, likely due to a direct antimicrobial action of the zinc ion in the GI tract, making it a critical tool for treating diarrheal episodes among children in the developing world.' },
  { id:'p111', cat:'Zinc', q:'List other therapeutic uses of zinc.', a:'- Prostate cancer, where it is capable of killing cells rapidly\n- Lozenges for the common cold\n- Topical preparations against sunburn\n- Inclusion as an anti-dandruff ingredient in some shampoos\n- Trials in infertile men to improve spermatogenesis' },

  { id:'p112', cat:'Fluoride', q:'What are the sources of fluoride?', a:'Fluoride is present naturally in low concentrations in drinking water and foods; tea leaves, table wine, potato, and carrots are other sources.' },
  { id:'p113', cat:'Fluoride', q:'What is the main function of fluoride, and how is it delivered for this purpose?', a:'It is a naturally occurring mineral that helps prevent cavities in children and adults by making the outer surface of the teeth (enamel) more resistant to the acid attacks that cause tooth decay; for this reason, it is used in toothpaste and water fluoridation.' },
  { id:'p114', cat:'Fluoride', q:'What are the effects of excess fluoride intake, and what is the maximum safe daily intake for an adult?', a:'At much higher doses, fluoride causes health complications such as skeletal and dental fluorosis and can be toxic; reported daily intakes range from 0.46 to 5.40 mg per day, with a maximum of 10 mg for an adult.' },
  { id:'p115', cat:'Fluoride', q:'What conditions result from fluoride deficiency?', a:'Increased dental caries (tooth decay) and possibly osteoporosis.' },
  { id:'p116', cat:'Fluoride', q:'How is fluoride administered systemically, and when is this unnecessary?', a:'As an additive to drinking water, salt, or milk, or as an ingredient in tablets, lozenges, or drops; where public water is fluoridated, other systemic therapies are not necessary or recommended.' },

  { id:'p117', cat:'Selenium', q:'What are the sources and main function of selenium?', a:'Sources include fish, thyroid glands, nuts, cereals, and mushrooms; selenium functions as a cofactor in the reduction of antioxidant enzymes.' },
  { id:'p118', cat:'Selenium', q:'List the therapeutic uses of selenium.', a:'- An ingredient in many multivitamins and other dietary supplements, including infant formula\n- Improving spermatogenesis in infertile men\n- An active ingredient in some anti-dandruff shampoos' },

  { id:'p119', cat:'Clinical Case Review', q:'A 25-year-old female presents with muscle weakness, bone pain, and difficulty walking. What is the likely diagnosis?', a:'Vitamin D deficiency; vitamin D is necessary for the absorption of calcium and the maintenance of strong bones, and deficiency can occur due to insufficient dietary intake or lack of sunlight exposure.' },
  { id:'p120', cat:'Clinical Case Review', q:'A 70-year-old male presents with weakness, fatigue, numbness and tingling in the hands and feet, and red, tender, bleeding gums. What is the likely diagnosis?', a:'Vitamin B12 deficiency together with scurvy (vitamin C deficiency); vitamin B12 is necessary for the formation of red blood cells and nerve function, and vitamin C deficiency causes gingival bleeding and connective tissue weakness.' },
  { id:'p121', cat:'Clinical Case Review', q:'A 6-year-old male presents with night blindness, dry eyes, and increased susceptibility to infections. What is the likely diagnosis?', a:'Vitamin A deficiency; vitamin A is necessary for vision, immune function, and skin health, and deficiency can occur due to insufficient dietary intake, malabsorption, or liver disease.' },
  { id:'p122', cat:'Clinical Case Review', q:'A 45-year-old male presents with muscle weakness, fatigue, and irregular heartbeat. What is the likely diagnosis?', a:'Magnesium deficiency; magnesium is necessary for muscle and nerve function, heart health, and bone health, and deficiency can occur due to insufficient dietary intake or malabsorption.' },
  { id:'p123', cat:'Clinical Case Review', q:'A 3-year-old male presents with moon face, oedema on the legs, a protruded belly, mental changes, and poor growth. What is the likely diagnosis?', a:'Kwashiorkor.' },
];

/* ===================================================================
   Flashcard data — Menstruation-Related Disorders
   =================================================================== */
window.MENSTRUATION_CARDS = [
  { id:'m1', cat:'Menstrual Cycle Physiology', q:'What is a single menstrual cycle, and when does menarche typically occur?', a:'The time between the onset of one menstrual flow and the beginning of the next; menarche (the initial menstrual cycle) typically occurs around age 12, though normal menarche may occur as early as age 9 or as late as age 16.' },
  { id:'m2', cat:'Menstrual Cycle Physiology', q:'What factors can influence the onset of menstruation?', a:'Race, genetics, nutritional status, and body mass.' },
  { id:'m3', cat:'Menstrual Cycle Physiology', q:'What are the average and normal ranges for menstrual cycle length, and how is day 1 defined?', a:'The average menstrual cycle lasts 28 days, with a normal range of 21 to 25 days; the first day of the menstrual flow is called day 1 of the cycle.' },
  { id:'m4', cat:'Menstrual Cycle Physiology', q:'How long does menses typically last, and when does most blood loss occur?', a:'Menses usually lasts 5 days (plus or minus 2 days), with most of the blood loss occurring during days 1 and 2.' },
  { id:'m5', cat:'Menstrual Cycle Physiology', q:'What are the major components of menstrual fluid, and what defines abnormal blood loss?', a:'Endometrial cellular debris and blood; average blood loss is 30 to 50 mL (range 20 to 60 mL) per cycle, and a loss of more than 80 mL per cycle is considered abnormal and is associated with anaemia.' },
  { id:'m6', cat:'Menstrual Cycle Physiology', q:'What are the two principal hormonally-controlled reproductive events of each menstrual cycle?', a:'Maturation and release of an ovum (egg) from the ovaries, and preparation of the endometrial lining of the uterus for implantation of a fertilized ovum.' },
  { id:'m7', cat:'Menstrual Cycle Physiology', q:'In what two ways can the phases of the menstrual cycle be described?', a:'By changes in the ovary (follicular/ovulatory and luteal phases), or by changes in the uterine endometrium (menstrual/proliferative and secretory phases).' },
  { id:'m8', cat:'Menstrual Cycle Physiology', q:'According to the lecture notes, how does the follicular/ovulatory phase correlate with the uterine phases?', a:'The notes state that the follicular/ovulatory phase correlates with the secretory phase of the uterine cycle.' },
  { id:'m9', cat:'Menstrual Cycle Physiology', q:'Which axis controls the menstrual cycle, and what role does the hypothalamus play?', a:'The hypothalamic-pituitary-ovarian axis; the hypothalamus plays the key role in regulating the menstrual cycle by producing gonadotropin-releasing hormone (GnRH).' },
  { id:'m10', cat:'Menstrual Cycle Physiology', q:'What triggers the hypothalamus to release GnRH at the end of the previous cycle?', a:'Low levels of estradiol and progesterone, which occur at the end of the previous menstrual cycle.' },
  { id:'m11', cat:'Menstrual Cycle Physiology', q:'What does GnRH stimulate the pituitary to do?', a:'GnRH stimulates pituitary gonadotroph cells to synthesize and secrete luteinizing hormone (LH) and follicle-stimulating hormone (FSH).' },

  { id:'m12', cat:'Menstrual Cycle: Follicular & Ovulatory Phase', q:'What marks the beginning of the follicular phase in the ovary and the menstrual/proliferative phase in the uterus?', a:'Cycle day 1, the first day of menstrual blood flow.' },
  { id:'m13', cat:'Menstrual Cycle: Follicular & Ovulatory Phase', q:'How variable is the follicular phase in length?', a:'It is quite variable, lasting an average of 14 days but ranging in length between 3 and 21 days.' },
  { id:'m14', cat:'Menstrual Cycle: Follicular & Ovulatory Phase', q:'What happens during the follicular phase in terms of FSH and follicle development?', a:'FSH stimulates the maturation of a group of ovarian follicles, which secrete the estrogen estradiol, promoting growth of the uterine endometrium; by about cycle day 8, a single dominant follicle emerges, usually resulting in ovulation of only one egg.' },
  { id:'m15', cat:'Menstrual Cycle: Follicular & Ovulatory Phase', q:'How long is the ovulatory phase, and what event characterizes it?', a:'Approximately 3 days in length; it is characterized by the LH surge, a 48-hour period during which high levels of LH are secreted by the pituitary.' },
  { id:'m16', cat:'Menstrual Cycle: Follicular & Ovulatory Phase', q:'What does the LH surge trigger?', a:'It catalyzes the final steps in the maturation of the ovum, and stimulates production of prostaglandins and proteolytic enzymes, which are necessary for ovulation.' },
  { id:'m17', cat:'Menstrual Cycle: Follicular & Ovulatory Phase', q:'What happens to estradiol levels during the LH surge, and what can this cause?', a:'Levels of estradiol decrease, sometimes accompanied by mid-cycle endometrial bleeding.' },
  { id:'m18', cat:'Menstrual Cycle: Follicular & Ovulatory Phase', q:'When does ovulation typically occur relative to the start of the LH surge?', a:'Ovulation typically occurs within 35 to 44 hours after the beginning of the LH surge.' },
  { id:'m19', cat:'Menstrual Cycle: Follicular & Ovulatory Phase', q:'What is released at ovulation, and what symptom can this cause?', a:'Ovulation releases 5 to 10 mL of follicular fluid containing the oocyte mass; this event may cause abdominal pain, called mittelschmerz, for some women.' },

  { id:'m20', cat:'Menstrual Cycle: Luteal Phase', q:'Define the luteal phase and its typical length.', a:'The time between ovulation and the beginning of menstrual blood flow; it is more constant in length than the follicular phase, lasting about 14 days (plus or minus 2 days).' },
  { id:'m21', cat:'Menstrual Cycle: Luteal Phase', q:'What is the corpus luteum, and what does it secrete?', a:'The structure formed after the follicle ruptures at ovulation; it secretes progesterone, estradiol, and androgens for about 10 to 12 days, its functional period.' },
  { id:'m22', cat:'Menstrual Cycle: Luteal Phase', q:'How do rising estrogen and progesterone levels affect the endometrium during the luteal phase?', a:'They alter the uterine endometrial lining; glands mature, proliferate, and become secretory in nature (secretory phase) as the uterus prepares for implantation of a fertilized egg.' },
  { id:'m23', cat:'Menstrual Cycle: Luteal Phase', q:'What happens to LH and FSH levels as progesterone and estrogen peak mid-luteal phase?', a:'Progesterone and estrogen levels reach their peaks in the middle of the luteal phase, whereas levels of LH and FSH decline in response to the increase in these two hormones.' },
  { id:'m24', cat:'Menstrual Cycle: Luteal Phase', q:'What supports the corpus luteum if pregnancy occurs?', a:'Human chorionic gonadotropin, released by the developing embryo, supports the function of the corpus luteum until the placenta develops enough to begin secreting estrogen and progesterone.' },
  { id:'m25', cat:'Menstrual Cycle: Luteal Phase', q:'What happens to the corpus luteum, and to estrogen and progesterone levels, if pregnancy does not occur?', a:'The corpus luteum ceases to function, and oestrogen and progesterone levels decline.' },
  { id:'m26', cat:'Menstrual Cycle: Luteal Phase', q:'What happens to the endometrium as estrogen and progesterone decline at the end of the luteal phase?', a:'The endometrial lining of the uterus becomes oedematous and necrotic, and the decrease in progesterone also allows prostaglandin synthesis.' },
  { id:'m27', cat:'Menstrual Cycle: Luteal Phase', q:'What events lead directly to menstrual bleeding?', a:'Following prostaglandin-initiated vasoconstriction and uterine contractions, the sloughing of the outer two endometrial layers occurs.' },
  { id:'m28', cat:'Menstrual Cycle: Luteal Phase', q:'What restarts the menstrual cycle after menstruation begins?', a:'The decline in estrogen and progesterone results in an increase in GnRH and in the renewed production of LH and FSH, which begins a new menstrual cycle.' },

  { id:'m29', cat:'Dysmenorrhea: Definitions & Epidemiology', q:'Define dysmenorrhea and its two subtypes.', a:'Difficult or painful menstruation; primary dysmenorrhea is idiopathic, associated with cramp-like abdominal pain at the time of menstruation with no identifiable organic pelvic disease, while secondary dysmenorrhea is usually associated with pelvic pathology.' },
  { id:'m30', cat:'Dysmenorrhea: Definitions & Epidemiology', q:'In which population is dysmenorrhea prevalence highest, and when does it typically develop?', a:'The prevalence of dysmenorrhea is highest in adolescent women; it usually develops within 6 to 12 months of menarche and generally affects women during their teenage years and early 20s.' },
  { id:'m31', cat:'Dysmenorrhea: Definitions & Epidemiology', q:'During which type of menstrual cycles does primary dysmenorrhea occur, and what is its significance for school and work?', a:'Primary dysmenorrhea occurs only during ovulatory cycles, and has been described as the single greatest cause of school absenteeism and lost working hours among adolescent girls and young women.' },
  { id:'m32', cat:'Dysmenorrhea: Definitions & Epidemiology', q:'Why does the prevalence and severity of dysmenorrhea decrease in women in their late 20s and older?', a:'This decrease may be partially explained by oral contraceptive use and pregnancy.' },

  { id:'m33', cat:'Dysmenorrhea: Etiology & Pathophysiology', q:'To what is the cause of primary dysmenorrhea related, and how do prostaglandin levels compare between women with and without dysmenorrhea?', a:'It is known to be related to prostaglandin levels; prostaglandin serum and endometrial levels are three to four times greater in women with dysmenorrhea than in women without it, and are highest during the first 2 days of menses.' },
  { id:'m34', cat:'Dysmenorrhea: Etiology & Pathophysiology', q:'Which uterine tissues synthesize prostaglandins, and what other inflammatory mediators are elevated in dysmenorrhea?', a:'Both the endometrium and the myometrium of the uterus have the capacity to synthesize prostaglandins; leukotrienes, inflammatory mediators known to cause vasoconstriction and uterine contractions, have also been found to be elevated in women with dysmenorrhea.' },
  { id:'m35', cat:'Dysmenorrhea: Etiology & Pathophysiology', q:'What role may leukotrienes play in women who do not respond to NSAID therapy?', a:'It has been suggested that leukotrienes may contribute significantly to dysmenorrhea in women who do not respond to therapy with prostaglandin inhibitors, such as NSAIDs.' },
  { id:'m36', cat:'Dysmenorrhea: Etiology & Pathophysiology', q:'What hormonal change at the end of the luteal phase initiates the pathophysiologic cascade of primary dysmenorrhea?', a:'At the end of the luteal phase, progesterone levels decrease, resulting in an increase in arachidonic acid, which is the precursor to both prostaglandins (notably PGF2a) and leukotrienes.' },
  { id:'m37', cat:'Dysmenorrhea: Etiology & Pathophysiology', q:'What are the effects of prostaglandins on the uterus, and what else do they release?', a:'Prostaglandins stimulate uterine contractions and cervical narrowing, and release vasopressin.' },
  { id:'m38', cat:'Dysmenorrhea: Etiology & Pathophysiology', q:'What effect do leukotrienes have on uterine pain fibers?', a:'Leukotrienes are potent smooth muscle-stimulating substances that increase the sensitivity of uterine pain fibers.' },
  { id:'m39', cat:'Dysmenorrhea: Etiology & Pathophysiology', q:'How do normal menstrual uterine contractions compare with those in dysmenorrhea, in pressure, duration, and frequency?', a:'During normal menses, contraction pressure is 50 to 80 mmHg, each contraction lasts about 15 to 30 seconds, and about one to four contractions occur every 10 minutes. With dysmenorrhea, contraction pressure can exceed 400 mmHg, contractions may last longer than 90 seconds, and the time between contractions may be less than 15 seconds.' },
  { id:'m40', cat:'Dysmenorrhea: Etiology & Pathophysiology', q:'How do elevated intrauterine pressure and contraction frequency ultimately cause pain in dysmenorrhea?', a:'Both intrauterine pressure and the frequency of uterine contractions contribute to ischemia and tissue hypoxia, and thus to pain.' },

  { id:'m41', cat:'Dysmenorrhea: Clinical Presentation', q:'Describe the character and location of primary dysmenorrhea pain.', a:'Cramping pain in the lower mid-abdominal or suprapubic region, which may radiate to the lower back and upper thighs.' },
  { id:'m42', cat:'Dysmenorrhea: Clinical Presentation', q:'What associated symptoms may accompany the pain of dysmenorrhea?', a:'Nausea, vomiting, fatigue, weakness, nervousness, dizziness, diarrhoea, and headache.' },
  { id:'m43', cat:'Dysmenorrhea: Clinical Presentation', q:'When does the pain of primary dysmenorrhea typically begin, and how long does it last?', a:'The onset of pain is several hours prior to or coincident with the onset of menses, and it usually lasts less than 24 hours but may persist up to 48 to 72 hours.' },
  { id:'m44', cat:'Dysmenorrhea: Clinical Presentation', q:'In relation to menarche, when does primary dysmenorrhea usually first occur?', a:'Usually within the first 3 years after menarche, but not within the first 6 months after the onset of menses.' },
  { id:'m45', cat:'Dysmenorrhea: Clinical Presentation', q:'What clinical criteria support a diagnosis of primary dysmenorrhea without further workup?', a:'If the pain is mild to moderate and the patient responds to NSAID therapy, this clinical presentation can be adequate for the diagnosis of primary dysmenorrhea.' },
  { id:'m46', cat:'Dysmenorrhea: Clinical Presentation', q:'What features suggest secondary rather than primary dysmenorrhea?', a:'Onset during the first several menstrual cycles or years after menarche, or at 25 years of age or older; pelvic pain occurring at times other than during menses and unrelated to the first day of menses; irregular menstrual cycles; menorrhagia; or a history of pelvic inflammatory disease (PID) or infertility.' },
  { id:'m47', cat:'Dysmenorrhea: Clinical Presentation', q:'List the recognized causes of secondary dysmenorrhea.', a:'Endometriosis, PID, ovarian cysts, benign uterine tumors, uterine fibroids, adhesions, cervical stenosis, congenital abnormalities, and the presence of an intrauterine device (IUD).' },
  { id:'m48', cat:'Dysmenorrhea: Clinical Presentation', q:'Why is medical evaluation necessary when secondary dysmenorrhea is suspected?', a:'Because symptoms of dysmenorrhea are similar to those of endometriosis, ectopic pregnancy, and PID, medical evaluation is necessary to rule out the presence of secondary causes of dysmenorrhea.' },

  { id:'m49', cat:'Dysmenorrhea: Treatment Approach', q:'What are the goals of treating primary dysmenorrhea?', a:'To provide relief and limit discomfort and minimize the disruption in usual activities.' },
  { id:'m50', cat:'Dysmenorrhea: Treatment Approach', q:'What proportion of women with dysmenorrhea can be successfully treated, and with what therapies?', a:'Approximately 80% to 90% of women with dysmenorrhea can be successfully treated with NSAIDs, oral contraceptives, or a combination of both.' },
  { id:'m51', cat:'Dysmenorrhea: Treatment Approach', q:'What is the role of non-pharmacologic measures such as heating pads, exercise, and other lifestyle modifications?', a:'They serve as adjuncts to drug therapy and are rarely adequate as sole therapy for primary dysmenorrhea.' },
  { id:'m52', cat:'Dysmenorrhea: Treatment Approach', q:'When should a patient with dysmenorrhea be referred to a primary care provider?', a:'The patient with more severe dysmenorrhea, or dysmenorrhea that does not respond to non-prescription therapy, should be referred to their primary care provider; a trial with other prescription NSAIDs or therapy with an oral contraceptive may then be prescribed.' },
  { id:'m53', cat:'Dysmenorrhea: Treatment Approach', q:'Which other menstrual cycling conditions should prompt referral rather than self-treatment?', a:'Amenorrhea, menorrhagia, and dysfunctional uterine bleeding; none of these conditions is amenable to self-treatment, and the patient should be advised to seek medical evaluation.' },

  { id:'m54', cat:'Dysmenorrhea: Nonpharmacologic Therapy', q:'According to a study of 289 adolescents, what nondrug measures were most commonly used, and how effective were they rated?', a:'Common nondrug measures were rest (90% of respondents), heat (74%), wearing loose clothing (67%), exercise (57%), and rubbing or massaging where it hurt (54%); except for wearing of loose clothing, these measures were reported to be about 50% effective in relieving discomfort.' },
  { id:'m55', cat:'Dysmenorrhea: Nonpharmacologic Therapy', q:'How effective was an abdominal heat patch compared with placebo and with drug therapy?', a:'It was significantly better than placebo in relieving pain; its analgesic effect had a faster onset than drug therapy, and it added to the relief provided by ibuprofen.' },
  { id:'m56', cat:'Dysmenorrhea: Nonpharmacologic Therapy', q:'For which patients is nondrug therapy especially useful?', a:'Nondrug therapy may be especially useful for the estimated 15% of women who cannot tolerate or who do not respond to non-prescription medications.' },
