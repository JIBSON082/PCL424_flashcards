  { id:'c14', cat:'COC Benefits & Risks', q:'List the disadvantages of oral contraceptives.', a:'- No protection against sexually transmitted infections\n- Requires daily administration\n- Unwanted menstrual cycle changes (breakthrough bleeding)\n- Nausea and vomiting\n- Headaches\n- Increased cervical ectopy and chlamydia infection\n- Potential increased cardiovascular risk with increased age, BMI, and smoking\n- Acceleration of gall bladder disease\n- Hepatocellular adenoma' },
  { id:'c15', cat:'COC Benefits & Risks', q:'List the medical contraindications to combined oral contraceptive use.', a:'- Known or history of deep venous thrombosis or pulmonary embolism\n- History of stroke, coronary artery disease, or ischemic heart disease\n- Diabetes with microvascular complications, duration over 20 years, or age over 35\n- History of estrogen-dependent cancer, including breast cancer\n- Current pregnancy\n- Migraines with aura, focal neurological symptoms, or vascular risk after age 35\n- Smoking more than 20 cigarettes a day and age over 35\n- Untreated hypertension greater than 160/100 or with vascular disease\n- Liver disease\n- Major surgery with prolonged immobilization or leg surgery\n- Personal or family history of hypercoagulable disorder\n- Less than 2 weeks postpartum\n- Systemic lupus erythematosus\n- Hypertriglyceridemia' },
  { id:'c16', cat:'COC Benefits & Risks', q:'Besides the medical contraindications, what other client factors should prompt caution before prescribing a hormonal contraceptive?', a:'Being on anticoagulants or having a blood clotting disorder, a history of severe depression, diabetes, high blood pressure, or irregular periods spaced at long intervals.' },
  { id:'c17', cat:'COC Benefits & Risks', q:'What does the doctor evaluation include before starting a hormonal contraceptive?', a:'Taking a medical history, measuring weight and blood pressure, and performing a breast check, pelvic exam, and Pap smear.' },

  { id:'c18', cat:'Combined Oral Contraceptives', q:'What is a combined oral contraceptive, and what are the two types by hormone pattern?', a:'A preparation of synthetic oestrogen and progestagen highly effective at preventing pregnancy. Monophasic pills give a fixed hormone concentration throughout the cycle; multiphasic pills vary the concentration in 2 (biphasic) or 3 (triphasic) steps.' },
  { id:'c19', cat:'Combined Oral Contraceptives', q:'Describe the two packet formats COCs are available in.', a:'A 21-pill pack, taken daily for 21 days followed by a 7-day pill-free break; or a pack where a hormone pill is taken daily for 21 days followed by 7 placebo pills instead of a break.' },

  { id:'c20', cat:'Progestagen-Only Pill (POP)', q:'What distinguishes the progestagen-only pill (POP) from the combined pill, and what progestagen dose does it contain?', a:'It contains only a progestagen, at a tenth to a half the dose used in combined pills (0.03 to 0.6 mg, depending on the progestagen type), and comes from the norethisterone or levonorgestrel groups.' },
  { id:'c21', cat:'Progestagen-Only Pill (POP)', q:'How is the POP taken, and how does its effectiveness compare with the COC?', a:'It is taken every day at the same time (within a 2 to 4 hour window), without a break, regardless of bleeding pattern. It is slightly less effective than the COC, especially in younger women, but similar in effectiveness to the COC in women over 35.' },
  { id:'c22', cat:'Progestagen-Only Pill (POP)', q:'What common side effects may occur with the pill, and when do they typically resolve?', a:'Breakthrough bleeding, breast tenderness, headaches, bloating, nausea, weight change, and mood changes; these usually resolve after 2 to 6 months as the body adjusts.' },
  { id:'c23', cat:'Progestagen-Only Pill (POP)', q:'What does the ACHES acronym stand for, and what does it represent?', a:'Abdominal pain (severe) or yellow skin/eyes, Chest pain (severe), Headaches (severe), Eye problems, and Severe leg pain or swelling — the warning signs of a serious pill-related problem that should prompt contacting a health provider immediately.' },

  { id:'c24', cat:'Injectables (Depo Provera)', q:'How often is the Depo Provera shot given, and by whom?', a:'Every 12 weeks (4 times a year), given by a trained health care provider in the arm or buttock.' },
  { id:'c25', cat:'Injectables (Depo Provera)', q:'How does the timing of the first Depo shot affect the need for back-up contraception?', a:'If given during the first 5 days of the period, protection is immediate. If given at another time, a back-up method such as condoms is needed for 7 days.' },
  { id:'c26', cat:'Injectables (Depo Provera)', q:'List the common side effects of Depo Provera and when they typically resolve.', a:'Irregular bleeding, changes in period pattern, and weight gain, which usually resolve during the first 6 to 12 months as the body adjusts.' },
  { id:'c27', cat:'Injectables (Depo Provera)', q:'List the less common side effects of Depo Provera.', a:'Mood changes (irritability), tiredness, headache, vaginal dryness, increased or decreased sex drive, and hair loss.' },
  { id:'c28', cat:'Injectables (Depo Provera)', q:'Which warning signs on Depo Provera should prompt contacting a health provider?', a:'Heavy vaginal bleeding, frequent very painful headaches, severe belly pain, and depression.' },
  { id:'c29', cat:'Injectables (Depo Provera)', q:'List the benefits of Depo Provera.', a:'Very effective (more so than the pill), long-lasting (only 4 visits a year), lighter or absent periods after 8 to 12 months, less menstrual pain, no daily pills, private, and safe for women who cannot take estrogen.' },
  { id:'c30', cat:'Injectables (Depo Provera)', q:'List the disadvantages of Depo Provera.', a:'No protection against HIV or other STIs, requires a clinic visit every 12 weeks, has a long-lasting effect that cannot be reversed immediately, and is not recommended for women with osteoporosis.' },

  { id:'c31', cat:'Emergency Contraception', q:'What is emergency contraception (EC), and what is the maximum window for use after unprotected sex?', a:'A special, stronger dose of birth control pills used to prevent pregnancy after unprotected sex; it can be used up to 5 days (120 hours) after intercourse, though sooner is better. It is not an abortion pill.' },
  { id:'c32', cat:'Emergency Contraception', q:'Name the two kinds of EC available and describe the dosing schedule.', a:'Progestin-only pills (such as Plan B) and combined estrogen/progestin pills (such as Preven); both are taken as two doses, the first as soon as possible within 5 days, and the second exactly 12 hours after the first.' },
  { id:'c33', cat:'Emergency Contraception', q:'What is the most common side effect of EC, and how can nausea be minimized?', a:'Nausea, lasting about a day; it can be minimized by choosing the progestin-only EC (less nausea than the combined type), eating food such as bread or crackers about 30 minutes before taking EC, or taking anti-nausea medicine 1 to 2 hours beforehand (which can cause drowsiness).' },
  { id:'c34', cat:'Emergency Contraception', q:'List the benefits and disadvantages of emergency contraception.', a:'Benefits: prevents pregnancy up to 120 hours after sex, no long-lasting side effects, safe for almost all women, and can be kept on hand. Disadvantages: less effective than regular methods like the pill or condoms, an increased relative risk of ectopic pregnancy if EC fails, and no protection against HIV or other STIs.' },

  { id:'c35', cat:'Transdermal Patch', q:'How does the contraceptive patch work, and how often is it changed?', a:'It releases hormones similar to those in birth control pills through the skin into the bloodstream. A new patch is applied once a week.' },
  { id:'c36', cat:'Transdermal Patch', q:'Describe the patch application cycle over 4 weeks.', a:'A new patch is applied each week for 3 weeks in a row (3 patches total), then no patch is worn during week 4 (the Patch Free Week), during which the period occurs; a new 4-week cycle then starts even if still bleeding.' },
  { id:'c37', cat:'Transdermal Patch', q:'Where on the body can the patch be applied?', a:'The outer upper arm, the upper body (front or back), the buttocks, or the belly — never the breasts.' },
  { id:'c38', cat:'Transdermal Patch', q:'What is the maximum number of days a woman should go without wearing a patch?', a:'7 days.' },
  { id:'c39', cat:'Transdermal Patch', q:'List the benefits and a key disadvantage of the patch related to body weight.', a:'Benefits: as effective as the pill, no daily dosing, regular lighter and shorter periods, and does not interrupt sex. Disadvantage: it is less effective in women who weigh 198 pounds (about 90 kg) or more, and it does not protect against HIV or other STIs.' },

  { id:'c40', cat:'Vaginal Contraceptive Ring', q:'How does the vaginal contraceptive ring (NuvaRing) work, and how long is each ring worn?', a:'It releases hormones similar to those in birth control pills into the body through the vagina; each ring is worn continuously for 3 weeks, followed by a Ring Free Week during which the period occurs.' },
  { id:'c41', cat:'Vaginal Contraceptive Ring', q:'When is a new ring inserted after the Ring Free Week, and what is the maximum time without a ring?', a:'A new ring is inserted exactly 1 week after the old one was removed, even if still bleeding; a woman should never go more than 7 days without a ring.' },
  { id:'c42', cat:'Vaginal Contraceptive Ring', q:'List the benefits of the vaginal ring.', a:'As effective as the pill, no daily pills, regular lighter and shorter periods, a very low hormone dose, private, and it can be used to skip periods under provider guidance.' },

  { id:'c43', cat:'Subdermal Implants', q:'Compare Norplant and Implanon as subdermal implant systems.', a:'Norplant was a set of 6 small levonorgestrel-filled capsules but is no longer produced; Implanon, a single-rod system, is now used in its place.' },
  { id:'c44', cat:'Subdermal Implants', q:'How quickly does the implant become effective, and by what mechanisms does it prevent pregnancy?', a:'It becomes effective within 24 hours of implantation. The released progestin thickens cervical mucus to block sperm, may suppress ovulation, and thins the uterine lining to hinder implantation.' },
  { id:'c45', cat:'Subdermal Implants', q:'What is the duration of protection offered by implants, and are they safe during breastfeeding?', a:'Continuous protection for up to five years; they are safe for women who are breastfeeding.' },
  { id:'c46', cat:'Subdermal Implants', q:'List the side effects and complications associated with implants.', a:'Menstrual disturbances and irregularities, headaches or migraines, increased acne, weight gain, nausea, anxiety, unwanted hair growth or loss, ovarian cysts, and an increased risk of ectopic pregnancy, which is a medical emergency if it occurs.' },

  { id:'c47', cat:'Intrauterine Device (IUD)', q:'What is the IUD, and what two substances can modern IUDs release to increase effectiveness?', a:'A small, T-shaped, flexible plastic device placed inside the uterus; modern IUDs release either copper or progestin.' },
  { id:'c48', cat:'Intrauterine Device (IUD)', q:'What precautions and follow-up are needed after IUD insertion?', a:'Avoid putting anything in the vagina for the first 5 to 7 days, call the clinic for fever or unusual pain/bleeding, return for a follow-up visit 4 to 6 weeks after insertion, and check the IUD string weekly for the first few months, then monthly thereafter.' },
  { id:'c49', cat:'Intrauterine Device (IUD)', q:'How does timing of IUD insertion affect the need for back-up contraception?', a:'Insertion during the period gives immediate protection; insertion at another time requires a back-up method such as condoms for 7 days.' },
  { id:'c50', cat:'Intrauterine Device (IUD)', q:'How do periods typically change with the copper IUD versus the progestin IUD?', a:'The copper IUD (hormone-free) keeps periods regular but a few days longer and heavier than usual. The progestin IUD causes irregular bleeding and cramping in the first 3 to 6 months, then shorter, lighter, less painful periods by 1 year, with one in five women having no period after a year; periods return to normal after removal.' },
  { id:'c51', cat:'Intrauterine Device (IUD)', q:'What side effects are specific to the progestin IUD, beyond bleeding pattern changes?', a:'Moodiness, headaches, and skin changes, because it releases a hormone.' },
  { id:'c52', cat:'Intrauterine Device (IUD)', q:'List the benefits of the IUD, including its duration by type.', a:'Very effective, more so than the pill; long-lasting, 5 years for the progestin IUD and 10 years for the copper IUD; easy to use, requiring only a monthly string check; a good option for women with at least one child; and usable while breastfeeding.' },
  { id:'c53', cat:'Intrauterine Device (IUD)', q:'What are the disadvantages of the IUD, and what warning signs suggest a serious problem?', a:'It does not protect against HIV or other STIs, requires a trained provider for insertion and removal, and insertion can be uncomfortable. The most serious problem is uterine infection, signaled by severe belly pain or cramps, deep pain during sex, severe chills, bad-smelling vaginal discharge, or very heavy bleeding.' },
];


/* ===================================================================
   Flashcard data — Infertility & the Pharmacist Role
   =================================================================== */
window.INFERTILITY_CARDS = [
  { id:'i1', cat:'Infertility Foundations', q:'Define infertility, and how does it differ from sterility?', a:'Infertility is an inability to achieve pregnancy despite regular unprotected intercourse, usually for a period of 1 year. Sterility is more definite and absolute, referring to an irreversible state, whereas infertility (sometimes called childlessness) is not necessarily permanent.' },
  { id:'i2', cat:'Infertility Foundations', q:'What proportion of couples with regular unprotected intercourse achieve pregnancy at 6, 12, and 18 to 24 months?', a:'About 60% achieve pregnancy within 6 months, 90% within 12 months, and 95% within 18 to 24 months.' },

  { id:'i3', cat:'Epidemiology', q:'Describe the geographic extent of the recognized infertility belt in Africa.', a:'It extends from West African countries (Senegal, Mali, Burkina Faso, Niger, and northern Nigeria) through Cameroon, Gabon, Congo, Zaire, Zambia, Central African Republic, and southwest Sudan, to East African countries (Uganda, southwestern Kenya, Ethiopia, and Tanzania).' },
  { id:'i4', cat:'Epidemiology', q:'How does the African infertility belt relate to the AIDS belt, and why?', a:'The infertility belt corresponds closely with the AIDS belt, because both infertility and AIDS are associated with sexually transmitted infections.' },
  { id:'i5', cat:'Epidemiology', q:'What is the estimated scope of infertility in Nigeria, and what infertility rate range is seen across developing countries?', a:'Over 800,000 couples in Nigeria are estimated to have difficulty achieving a desired pregnancy. Across developing countries, infertility rates range from 8.6% to 21.5%, with Eastern Africa having the lowest rate and Southern Africa the highest.' },
  { id:'i6', cat:'Epidemiology', q:'What proportion of infertile African women have a diagnosis attributable to a previous STI, and which pathogens are most implicated?', a:'An estimated 85% of infertile African women have a diagnosis attributable to a previous sexually transmitted infection. Gonorrhea and Chlamydia are the most commonly responsible pathogens, with the human papilloma virus also sometimes involved; nearly 75% of infertility in Africa relates to gonorrhea or Chlamydia that has spread to the upper reproductive tract.' },
  { id:'i7', cat:'Epidemiology', q:'What are the major preventable causes of infertility in most developing countries?', a:'Sexually transmitted infections, postpartum infection, and post-abortion infection.' },

  { id:'i8', cat:'Etiology', q:'In what proportion of infertility cases can a cause be identified, and how often is more than one cause present?', a:'A cause can be found in about 90% of cases, though about 10% of couples never learn why they cannot conceive. Between 10% and 30% of cases have more than one contributing cause.' },
  { id:'i9', cat:'Etiology', q:'What is usually responsible for male infertility?', a:'Defects in sperm quantity and quality.' },
  { id:'i10', cat:'Etiology', q:'What is pelvic inflammatory disease (PID), and why is it significant in infertility?', a:'PID is the major cause of infertility worldwide; it is a variety of infections, including gonorrhea and Chlamydia, that affect the reproductive organs, appendix, and parts of the intestine in the pelvic area. The fallopian tube is the site most often implicated, a condition called salpingitis.' },
  { id:'i11', cat:'Etiology', q:'How does endometriosis cause infertility, and how commonly is it implicated?', a:'It accounts for about 5% or more of infertility cases, with some studies citing up to 30%. It develops when fragments of the endometrial lining are carried upward through the tubes and implant elsewhere in the pelvis; these implants respond to hormonal changes, growing with each cycle and eventually causing scarring and inflammation.' },
  { id:'i12', cat:'Etiology', q:'List other recognized causes of female infertility beyond PID and endometriosis.', a:'Hypothalamic-pituitary disorders, polycystic ovarian syndrome, ovarian cysts, premature ovarian failure, luteal phase defect, benign uterine fibroids, surgical adhesions, ectopic pregnancies, certain drugs, inflammatory bowel disease, celiac sprue, epilepsy, thyroid disorders (hyper- and hypothyroidism), and physical damage from intrauterine devices.' },

  { id:'i13', cat:'Pharmacist Role: Prevention', q:'What preventive steps should a pharmacist take to help prevent infertility related to STIs and PID?', a:'- Stay current on preventing, diagnosing, and treating STIs and PID\n- Recognize that contraceptive choice influences PID risk\n- Provide public health education on the consequences of untreated sexual infections\n- Ensure access to early, confidential STI diagnosis and treatment, including for minors\n- Help young people identify STI risk factors\n- Encourage use of condoms, diaphragms, and spermicides alongside other contraceptive methods' },
  { id:'i14', cat:'Pharmacist Role: Prevention', q:'Since IUDs increase PID risk, what precautions should a pharmacist take around IUD recommendation and use?', a:'- Be conservative recommending IUDs to nulliparous women planning children\n- Avoid recommending IUDs to women at higher risk of STIs/PID, especially adolescents\n- Screen for STIs in all patients receiving an IUD\n- Never insert an IUD into a woman with an untreated STI\n- Consider antibiotic prophylaxis in high-STI-incidence areas\n- Treat any vaginal discharge in an IUD user as infection until proven otherwise\n- Ensure clients know the danger signs of pelvic infection and where to seek help' },
  { id:'i15', cat:'Pharmacist Role: Prevention', q:'What should a pharmacist emphasize regarding sterilization and induced abortion?', a:'The permanence of sterilization, since reversal is an expensive procedure with uncertain prognosis, and the risk of infertility from abortions, especially when performed by untrained personnel without adequate hygiene or equipment.' },

  { id:'i16', cat:'Infertility Work-Up', q:'List the situations in which an infertility evaluation should begin promptly rather than advising the couple to wait and see.', a:'- The woman is in her late 30s (fertility declines steeply after 40; women over 35 get priority)\n- The woman has irregular menses, which may signal sporadic ovulation or premature ovarian failure\n- The couple history includes mumps in the man, or repeated miscarriage, ectopic pregnancy, or PID in the woman, or prior pelvic surgery\n- The woman has severe progressive dysmenorrhea or dyspareunia, suggesting endometriosis\n- The woman has a history of IUD use, pelvic infection, or ovarian/tubal/uterine surgery\n- The couple lives in an area with high endemic STI incidence' },
  { id:'i17', cat:'Infertility Work-Up', q:'What basic initial work-up services can a pharmacist provide?', a:'Educating the patients, gathering pertinent historical information, providing a thorough physical examination, and providing a resource for reassurance, counseling, and emotional stability, including referrals as needed.' },
  { id:'i18', cat:'Infertility Work-Up', q:'How should history-taking be structured when counseling an infertile couple?', a:'Interview the couple together first about factors affecting reproductive performance (anatomical, infectious, and toxic), then interview the man and woman separately to obtain confidential information.' },
  { id:'i19', cat:'Infertility Work-Up', q:'What should the physical examination of an infertile woman assess?', a:'Hair distribution and body/breast development for signs of endocrinopathies (hypogonadism, adrenal hyperplasia, hypothyroidism, ovarian dysfunction, hyperprolactinemia), plus a pelvic exam checking for uterine hypoplasia, adnexal tumours, cervical lesions, and whether dyspareunia may be a problem.' },
  { id:'i20', cat:'Infertility Work-Up', q:'What should the physical examination of an infertile man assess?', a:'Sexual characteristics for endocrinopathies such as hypogonadism or Klinefelter syndrome, and a penile exam for hypospadias, phimosis, cysts, cryptorchidism, vas thickening or absence, hydrocele, or varicocele.' },

  { id:'i21', cat:'Counseling & Semen Evaluation', q:'What does fertility counseling typically evaluate?', a:'Fertility awareness techniques and optimal coital timing, screening for asymptomatic STIs, whether ovulation is occurring (via basal body temperature or cervical mucus records), and semen analysis.' },
  { id:'i22', cat:'Counseling & Semen Evaluation', q:'What instructions should a man follow before providing a semen sample for evaluation?', a:'Abstain from ejaculation for at least 3 and no more than 5 days; avoid alcohol or a hot shower/bath just before producing the sample; ejaculate into a small, sterile, dry, wide-mouth jar; deliver it to the laboratory within an hour; and keep it close to body temperature.' },
  { id:'i23', cat:'Counseling & Semen Evaluation', q:'According to WHO criteria, what defines a normal semen sample?', a:'Concentration greater than 20 x 10^6 sperm/mL, greater than 40% progressive motility, greater than 50% normal morphology (forms), greater than 60% viability (alive), no significant agglutination, normal appearance and viscosity of seminal fluid, and less than 10^6 white blood cells/mL.' },
  { id:'i24', cat:'Counseling & Semen Evaluation', q:'Why might more than one semen evaluation be necessary, and what does WHO recommend?', a:'Because a single result, particularly if borderline, may not accurately reflect sperm and semen status; WHO recommends two samples taken at least 2 weeks apart.' },

  { id:'i25', cat:'Management: Male Infertility', q:'How is male infertility due to azospermia or impotence typically managed, and what safety measure is required for donor sperm?', a:'With insemination using donor sperm. The sperm must be frozen and quarantined for 6 months, and only released if the donor remains HIV antibody negative after that period, to avoid transmitting STIs including HIV.' },

  { id:'i26', cat:'Management: Female Infertility', q:'How are cervical mucus problems that impair conception managed?', a:'With insemination or uterine instillation of a small amount of specially prepared sperm.' },
  { id:'i27', cat:'Management: Female Infertility', q:'What is cervical incompetence, and how is it managed?', a:'A condition where the cervix cannot maintain a pregnancy; it is managed with cerclage, bed rest, or both. Cerclage involves passing strong suture material around the cervix like a purse string to prevent premature dilation.' },
  { id:'i28', cat:'Management: Female Infertility', q:'How are ovulation disorders treated, including in women with hyperprolactinemia?', a:'With drugs that induce ovulation, such as clomiphene citrate, which suppresses estrogen suppressive effect on ovulation. In women whose ovulation is suppressed by hyperprolactinemia, drugs that suppress prolactin, such as bromocriptine, may induce ovulation.' },
  { id:'i29', cat:'Management: Female Infertility', q:'How is infertility from significant ovarian damage (torsion, surgical removal, hemorrhagic cyst, or premature menopause) addressed?', a:'Only through high-technology fertility medicine using ova donated from another woman.' },
  { id:'i30', cat:'Management: Female Infertility', q:'How are uterine or tubal abnormalities that cause infertility corrected?', a:'By surgical procedures.' },

  { id:'i31', cat:'High-Technology Approaches', q:'Describe gamete intra-fallopian tube transfer (GIFT) and its typical indication.', a:'A procedure that places a mixture of ova and sperm directly into the fallopian tube; it is used primarily for unexplained infertility where the fallopian tubes appear normal.' },
  { id:'i32', cat:'High-Technology Approaches', q:'Describe the process of in vitro fertilization (IVF).', a:'Mature ova, harvested via laparoscopy or trans-vaginally, are combined with specially prepared sperm in a laboratory culture medium and incubated to allow fertilization; fertilized ova that reach sufficient maturity are placed in the uterus via a trans-cervical catheter.' },
  { id:'i33', cat:'High-Technology Approaches', q:'What do high-technology fertility approaches like GIFT and IVF frequently use to increase the number of ova available for harvest?', a:'Ovulation stimulation drugs.' },

  { id:'i34', cat:'Referrals & Broader Role', q:'When should a pharmacist refer an infertile couple onward, and to whom?', a:'When couples require more specialized care that may need high-technology approaches, they should be referred to infertility specialists or obstetrics and gynecology consultants skilled in fertility issues, ensuring procedures are not duplicated unnecessarily.' },
  { id:'i35', cat:'Referrals & Broader Role', q:'Beyond clinical referral, what other referral option might a pharmacist discuss with an infertile couple?', a:'Referral to adoption agencies or other legal homes for adoption, though this is not common practice in Africa, it may be the only solution for some couples.' },
  { id:'i36', cat:'Referrals & Broader Role', q:'How does a pharmacist providing infertility services contribute to community information and awareness?', a:'By staying current on the epidemiology of infertility and STIs locally, serving as a resource for researchers and epidemiologists, providing accurate statistical data, and acting as an advocate for appropriate political programs at the community or local government level.' },
];

/* ---------- Roundcards app logic (validated standalone, then embedded) ---------- */
(function () {
  "use strict";
  var e = React.createElement;
  var useState = React.useState;
  var useEffect = React.useEffect;
  var useRef = React.useRef;
  var useMemo = React.useMemo;
  var useCallback = React.useCallback;

  /* ---------------- storage ---------------- */
  var STORAGE_KEY = "roundcards_v1";

  function loadState() {
    try {
      var raw = window.localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      var parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== "object") return null;
      return parsed;
    } catch (err) {
      return null;
    }
  }

  function saveState(state) {
    try {
      window.localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (err) {
      /* storage unavailable (private mode, quota, etc) — app still works this session */
    }
  }

  function freshDeckState(cards) {
    return {
      order: cards.map(function (c) { return c.id; }),
      pos: 0,
      status: {},
      focusMode: false
    };
  }

  function defaultState() {
    return {
      name: "",
      stage: "name",
      activeTopic: null,
      decks: {
        git: freshDeckState(window.GIT_CARDS),
        liver: freshDeckState(window.LIVER_CARDS),
        hrt: freshDeckState(window.HRT_CARDS),
        contraception: freshDeckState(window.CONTRACEPTION_CARDS),
        infertility: freshDeckState(window.INFERTILITY_CARDS)
      }
    };
  }

  function shuffleArray(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function reconcileDeck(saved, cards) {
    var validIds = cards.map(function (c) { return c.id; });
    var validSet = {};
    validIds.forEach(function (id) { validSet[id] = true; });
    var order = (saved && Array.isArray(saved.order)) ? saved.order.filter(function (id) { return validSet[id]; }) : [];
    var missing = validIds.filter(function (id) { return order.indexOf(id) === -1; });
    order = order.concat(missing);
    var status = {};
    if (saved && saved.status) {
      Object.keys(saved.status).forEach(function (id) {
        if (validSet[id]) status[id] = saved.status[id];
      });
    }
    var pos = (saved && typeof saved.pos === "number") ? Math.max(0, Math.min(saved.pos, order.length)) : 0;
    var focusMode = saved ? !!saved.focusMode : false;
    return { order: order, pos: pos, status: status, focusMode: focusMode };
  }

  function firstPos(order, status, focusMode) {
    if (!focusMode) return 0;
    for (var i = 0; i < order.length; i++) {
      if (status[order[i]] !== "mastered") return i;
    }
    return order.length;
  }

  function prefersReducedMotion() {
    try {
      return window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    } catch (err) {
      return false;
    }
  }

  /* ---------------- deck metadata ---------------- */
  var DECKS = {
    git: {
      key: "git",
      label: "GI",
      title: "GERD & Peptic Ulcer Disease",
      subtitle: "Gastrointestinal Tract Disorders",
      tint: "amber",
      colorVar: "--amber",
      brightVar: "--amber-bright",
      cards: window.GIT_CARDS
    },
    liver: {
      key: "liver",
      label: "HB",
      title: "Liver & Biliary Tract Disorders",
      subtitle: "Acute Liver Failure, Cirrhosis & Hepatobiliary Function",
      tint: "garnet",
      colorVar: "--garnet",
      brightVar: "--garnet-bright",
      cards: window.LIVER_CARDS
    },
    hrt: {
      key: "hrt",
      label: "HR",
      title: "Hormone Replacement Therapy",
      subtitle: "Menopause & Hormonal Management",
      tint: "violet",
      colorVar: "--violet",
      brightVar: "--violet-bright",
      cards: window.HRT_CARDS
    },
    contraception: {
      key: "contraception",
