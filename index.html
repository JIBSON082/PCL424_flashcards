  { id:'m57', cat:'Dysmenorrhea: Nonpharmacologic Therapy', q:'How does smoking affect dysmenorrhea severity, and what is the proposed mechanism?', a:'Smoking has been associated with more severe dysmenorrhea, with severity reportedly increasing with the number of cigarettes smoked per day; the basis for this effect is unknown, but nicotine-induced vasoconstriction has been hypothesized to be involved.' },
  { id:'m58', cat:'Dysmenorrhea: Nonpharmacologic Therapy', q:'What does the evidence say about exercise as a treatment for dysmenorrhea?', a:'Evidence regarding the benefit of exercise is conflicting, though participation in regular exercise may lessen the symptoms of primary dysmenorrhea for some women.' },

  { id:'m59', cat:'Dysmenorrhea: Pharmacotherapy', q:'Which three non-prescription analgesics are most commonly used to treat dysmenorrhea, and how do acetaminophen and aspirin compare with nonsalicylate NSAIDs?', a:'Acetaminophen, aspirin, and ibuprofen are the three non-prescription analgesic medications most commonly used; acetaminophen and aspirin are less effective than nonsalicylate NSAIDs for treating dysmenorrhea.' },
  { id:'m60', cat:'Dysmenorrhea: Pharmacotherapy', q:'Why is aspirin not recommended for adolescents with dysmenorrhea?', a:'Aspirin is not recommended for use by adolescents because of its association with Reye syndrome.' },
  { id:'m61', cat:'Dysmenorrhea: Pharmacotherapy', q:'What are the recommended and maximum daily doses of acetaminophen for dysmenorrhea?', a:'650 to 1000 mg every 4 to 6 hours, with a maximum daily dose of 4000 mg.' },
  { id:'m62', cat:'Dysmenorrhea: Pharmacotherapy', q:'What are the recommended and maximum daily doses of aspirin for dysmenorrhea?', a:'650 to 1000 mg every 4 to 6 hours, with a maximum daily dose of 4000 mg.' },
  { id:'m63', cat:'Dysmenorrhea: Pharmacotherapy', q:'What are the recommended and maximum daily doses of ibuprofen for dysmenorrhea?', a:'200 to 400 mg every 4 to 6 hours, with a maximum daily dose of 1200 mg.' },
  { id:'m64', cat:'Dysmenorrhea: Pharmacotherapy', q:'What are the recommended and maximum daily doses of ketoprofen for dysmenorrhea?', a:'12.5 to 25 mg every 4 to 8 hours, not more than 25 mg within 4 to 6 hours, with a maximum daily dose of 75 mg.' },
  { id:'m65', cat:'Dysmenorrhea: Pharmacotherapy', q:'What are the recommended and maximum daily doses of naproxen sodium for dysmenorrhea?', a:'220 to 440 mg initially, then 220 mg every 8 to 12 hours, with a maximum daily dose of 660 mg.' },
  { id:'m66', cat:'Dysmenorrhea: Pharmacotherapy', q:'How effective is aspirin for treating dysmenorrhea?', a:'Aspirin may be adequate for treating mild symptoms of dysmenorrhea, but it is only moderately effective in women with more than minimal symptoms.' },
  { id:'m67', cat:'Dysmenorrhea: Pharmacotherapy', q:'What is the recommended dosing and administration advice for aspirin in dysmenorrhea?', a:'When used for menstrual discomfort, the adult dose is 650 to 1000 mg every 4 to 6 hours as needed, not to exceed 4000 mg per day; aspirin is best taken with food or with a full glass of water.' },
  { id:'m68', cat:'Dysmenorrhea: Pharmacotherapy', q:'Besides GI effects, what other adverse effect can aspirin have that is relevant to menstruation?', a:'Aspirin may increase menstrual flow.' },
  { id:'m69', cat:'Dysmenorrhea: Pharmacotherapy', q:'List the clinically significant drug-drug interactions of aspirin.', a:'Anticoagulants, methotrexate, valproate, probenecid, phenytoin, oral hypoglycaemics, and high doses of antacids.' },
  { id:'m70', cat:'Dysmenorrhea: Pharmacotherapy', q:'What conditions are contraindications or relative contraindications to aspirin therapy?', a:'Patients who are allergic or intolerant to aspirin should not use this agent; disease states that are relative contraindications to aspirin therapy include peptic ulcer disease, gastritis, bleeding disorders, asthma, or renal insufficiency.' },

  { id:'m71', cat:'Dysmenorrhea: Patient Counselling', q:'What key reassurance should adolescents and young women with dysmenorrhea receive?', a:'They should be educated about the condition so they realize it can be treated with products that can provide symptomatic relief, and reassured about the prevalence, or normality, of primary dysmenorrhea.' },
  { id:'m72', cat:'Dysmenorrhea: Patient Counselling', q:'What is the recommended approach if a patient response to the first nonsalicylate NSAID tried is inadequate?', a:'If response to the first agent is not adequate, other nonsalicylate NSAIDs can be tried before a primary care provider is consulted, since not all women will respond to the same agent.' },
  { id:'m73', cat:'Dysmenorrhea: Patient Counselling', q:'How soon should symptom improvement be expected after taking an analgesic for dysmenorrhea, and what is required for optimal effect?', a:'Symptoms should improve within an hour or so of taking an analgesic; the optimal effect of drug therapy may not be seen, however, until the woman has used the medication on a scheduled basis.' },
  { id:'m74', cat:'Dysmenorrhea: Patient Counselling', q:'What should follow-up monitoring for dysmenorrhea patients include?', a:'A follow-up phone call to discuss treatment effectiveness (continued or altered symptoms) and the importance of scheduled dosing, and to inquire about the dose of medication being taken and discuss an adequate dose.' },
  { id:'m75', cat:'Dysmenorrhea: Patient Counselling', q:'What should be advised for a patient with persistent dysmenorrhea symptoms despite therapy?', a:'The patient with persistent symptoms should be advised to try another non-prescription nonsalicylic NSAID or to see a primary care provider for evaluation.' },

  { id:'m76', cat:'PMS & PMDD: Definitions', q:'Define premenstrual syndrome (PMS).', a:'A cyclic disorder composed of a combination of physical and emotional (mood) changes that occur during the luteal phase of the menstrual cycle, improve significantly or disappear within the first several days of menstrual flow, and are absent during the first week following menses.' },
  { id:'m77', cat:'PMS & PMDD: Definitions', q:'How is a diagnosis of PMS made?', a:'The diagnosis of PMS can be made based on physical or mood symptoms that occur in a cyclic fashion.' },
  { id:'m78', cat:'PMS & PMDD: Definitions', q:'Define premenstrual dysphoric disorder (PMDD), and what does its diagnosis require?', a:'A severe form of PMS; the diagnosis of this condition requires that a specific constellation of symptoms are present on a cyclic basis and that the symptoms are severe enough to cause functional impairment, interfering with social or occupational functioning.' },

  { id:'m79', cat:'PMS & PMDD: Signs & Symptoms', q:'When do PMS symptoms typically begin, and during what part of the cycle should a symptom-free interval occur?', a:'PMS symptoms typically begin or intensify about a week prior to the onset of menses; a woman with PMS or PMDD should experience an essentially symptom-free interval during days 4 to 12 of her menstrual cycle.' },
  { id:'m80', cat:'PMS & PMDD: Signs & Symptoms', q:'How does the severity of PMS/PMDD symptoms change across reproductive life?', a:'Symptoms of PMS/PMDD appear worse early in reproductive life and tend to improve toward menopause, when ovulation may be intermittent and hormonal fluctuation lessens.' },
  { id:'m81', cat:'PMS & PMDD: Signs & Symptoms', q:'List the common symptoms of PMS.', a:'Minor weight gain, abdominal bloating, fatigue, irritability, anxiety or tension, mood lability, food cravings, breast tenderness, depression, acne, oversensitivity, crying spells, forgetfulness, and difficulty concentrating.' },
  { id:'m82', cat:'PMS & PMDD: Signs & Symptoms', q:'What are the most common affective symptoms reported by women with PMDD?', a:'Depressed mood, hopelessness, and self-depreciation; affective lability; irritability and anger; fatigability; and decreased interest.' },
  { id:'m83', cat:'PMS & PMDD: Signs & Symptoms', q:'List other symptoms of PMDD beyond the core affective symptoms.', a:'Difficulty concentrating, lethargy, hypersomnia or insomnia, and physical symptoms.' },
  { id:'m84', cat:'PMS & PMDD: Signs & Symptoms', q:'How much functional impairment does PMDD cause on average, and what tool is used to establish its diagnosis?', a:'The severity of symptoms results in an average of 2.6 days of impairment or disability per month; a daily rating of symptoms for several cycles is used to establish a diagnosis of PMDD, and these symptoms should have occurred during most menstrual cycles over the past year.' },
  { id:'m85', cat:'PMS & PMDD: Signs & Symptoms', q:'What does the absence of a symptom-free interval suggest?', a:'Lack of a symptom-free interval suggests that the patient has a psychiatric disorder (such as anxiety or panic disorder) or another health condition (such as perimenopause) rather than PMS.' },

  { id:'m86', cat:'PMS & PMDD: Treatment', q:'What are the treatment goals for PMS?', a:'First, an understanding of PMS, and second, symptom improvement or resolution.' },
  { id:'m87', cat:'PMS & PMDD: Treatment', q:'What does initial, conservative treatment of PMS consist of?', a:'Education and nondrug measures such as dietary modifications, physical exercise, and stress management; women with PMS should be educated about the syndrome and encouraged to elicit family support and understanding.' },
  { id:'m88', cat:'PMS & PMDD: Treatment', q:'Which nonpharmacologic therapies may provide some amelioration of PMS symptoms?', a:'Aerobic exercise, dietary modifications, and cognitive-behavioural therapy.' },
  { id:'m89', cat:'PMS & PMDD: Treatment', q:'Which non-prescription or complementary agents might be suggested for symptoms not responsive to nondrug therapy?', a:'Calcium, magnesium, vitamin E, pyridoxine, and chasteberry; use of a non-prescription diuretic or ginkgo may prove helpful for women with fluid retention.' },
  { id:'m90', cat:'PMS & PMDD: Treatment', q:'How much improvement is estimated from nondrug measures plus calcium or magnesium?', a:'Use of the nondrug measures, plus either calcium or magnesium, is estimated to provide significant improvement to about 25% of patients.' },
  { id:'m91', cat:'PMS & PMDD: Treatment', q:'When should prescription therapy be considered for PMS, and what does it include?', a:'Prescription therapy should be considered if treatment fails or if the patient suffers from severe PMS or PMDD; it includes psychotropic medications (such as alprazolam and SSRIs) and menstrual cycle modifiers (such as oral contraceptives, danazol, and GnRH agonists).' },

  { id:'m92', cat:'PMS & PMDD: Patient Counselling', q:'What should patient counselling for PMS emphasize regarding symptom timing and compliance?', a:'Patient counselling requires that women be educated about the timing of symptoms and what might control them, which may increase compliance with recommended therapies.' },
  { id:'m93', cat:'PMS & PMDD: Patient Counselling', q:'What should patients be told about the timeframe for treatment measures to work?', a:'The patient should be advised that treatment measures must be implemented during every menstrual cycle because it may take several cycles for symptomatic relief to occur.' },
  { id:'m94', cat:'PMS & PMDD: Patient Counselling', q:'What does monitoring for PMS treatment involve, and what should trigger referral to a primary care provider?', a:'Monitoring is accomplished by having the patient report whether symptoms are resolved, which may take several menstrual cycles to ascertain; reasons for advising the patient to see a primary care provider are persistent symptoms, or symptoms disruptive to personal relationships or to the ability to engage in usual activities.' },

  { id:'m95', cat:'Toxic Shock Syndrome', q:'What was toxic shock syndrome (TSS) originally described as, and in whom was it recognized?', a:'A severe multisystem illness characterized by high fever, profound hypotension, severe diarrhoea, mental confusion, renal failure, erythroderma, and skin desquamation, originally recognized as affecting a relatively large number of young, previously healthy, menstruating women.' },
  { id:'m96', cat:'Toxic Shock Syndrome', q:'How is TSS commonly divided, and when does menstrual TSS usually occur in the cycle?', a:'TSS is commonly divided into menstrual and non-menstrual cases; menstrual TSS usually occurs toward the middle or at the end of menses.' },
  { id:'m97', cat:'Toxic Shock Syndrome', q:'What prodromal symptoms precede TSS, and for how long?', a:'Malaise, myalgias, and chills, occurring for 2 to 3 days prior to TSS.' },
  { id:'m98', cat:'Toxic Shock Syndrome', q:'What GI symptoms occur early in TSS, and how many patients are affected?', a:'GI symptoms, including vomiting, diarrhoea, and abdominal pain, typically occur early in the illness and affect almost all patients.' },
  { id:'m99', cat:'Toxic Shock Syndrome', q:'Describe the full-blown presentation of TSS.', a:'High fever, myalgias, vomiting and diarrhoea, erythroderma, decreased urine output, severe hypotension, and shock.' },
  { id:'m100', cat:'Toxic Shock Syndrome', q:'What neurologic manifestations occur in TSS, and how commonly?', a:'Neurologic manifestations, including headache, confusion, agitation, lethargy, and seizures, occur in almost all cases.' },
  { id:'m101', cat:'Toxic Shock Syndrome', q:'What other organ system complications are common in TSS?', a:'Acute renal failure, cardiac involvement, and adult respiratory distress syndrome.' },
  { id:'m102', cat:'Toxic Shock Syndrome', q:'What dermatologic findings are required for a definite diagnosis of TSS, and what is their typical timing?', a:'Both an early rash and subsequent skin desquamation are required for a definite diagnosis; about 5 to 12 days after the onset of TSS, desquamation of the skin on the face, trunk, and extremities, including the soles of the feet and palms of the hands, occurs.' },
  { id:'m103', cat:'Toxic Shock Syndrome', q:'How can women reduce the risk of menstrual TSS to nearly zero?', a:'By using sanitary pads instead of tampons during their menstrual cycle.' },

          e("div", { className: "progress-fill", style: { width: Math.round(((deckState.pos) / total) * 100) + "%" } }),
          e("div", { className: "progress-mastered", style: { width: Math.round((masteredCount / total) * 100) + "%" } })
        ),
        e(
          "div",
          { className: "card-stage", onTouchStart: onTouchStart, onTouchEnd: onTouchEnd },
          e(
            "div",
            { className: "card-outer", ref: cardOuterRef },
            e(
              "div",
              { className: "card-inner", ref: cardInnerRef, onClick: toggleFlip, role: "button", tabIndex: 0, "aria-label": "Flip card" },
              e(
                "div",
                { className: "card-face card-front" },
                e("span", { className: "card-eyebrow" }, currentCard.cat),
                e("div", { className: "card-body-wrap" }, renderBody(currentCard.q, "card-question")),
                e("div", { className: "card-hint" }, e(IconArrow, null), " Tap to reveal the answer")
              ),
              e(
                "div",
                { className: "card-face card-back" },
                e("span", { className: "card-eyebrow card-eyebrow-answer" }, "Answer"),
                e("div", { className: "card-body-wrap" }, renderBody(currentCard.a, "card-answer")),
                e("div", { className: "card-hint" }, "Tap to see the question again")
              )
            )
          )
        ),
        e(
          "div",
          { className: "controls-row" },
          e("button", { className: "btn btn-icon", onClick: doShuffle, title: "Shuffle (S)" }, e(IconShuffle, null), e("span", { className: "btn-label" }, "Shuffle")),
          e("button", { className: "btn btn-icon", onClick: goPrev, title: "Previous (\u2190)" }, e(IconArrow, { dir: "left" }), e("span", { className: "btn-label" }, "Prev")),
          e("button", { className: "btn btn-primary btn-flip", onClick: toggleFlip, title: "Flip (space)" }, flipped ? "Show question" : "Reveal answer"),
          e("button", { className: "btn btn-icon", onClick: goNext, title: "Next (\u2192)" }, e("span", { className: "btn-label" }, "Next"), e(IconArrow, null)),
          e(
            "button",
            { className: "btn btn-icon btn-mastered" + ((deckState.status[currentId] === "mastered") ? " is-active" : ""), onClick: toggleMastered, title: "Mark mastered (M)" },
            e(IconCheck, null), e("span", { className: "btn-label" }, "Mastered")
          )
        ),
        e(
          "div",
          { className: "deck-footer" },
          e("label", { className: "focus-toggle" },
            e("input", { type: "checkbox", checked: deckState.focusMode, onChange: toggleFocusMode }),
            e("span", null, "Focus mode \u2014 unmastered only")
          ),
          e("div", { className: "stats-row" },
            e("span", null, newCount + " new"),
            e("span", null, seenCount + " reviewing"),
            e("span", null, masteredCount + " mastered")
          )
        ),
        e("p", { className: "keys-hint" }, "\u2190 \u2192 navigate \u00B7 space flip \u00B7 M master \u00B7 S shuffle")
      )
    );
  }

  /* ---------------- App ---------------- */
  function App() {
    var _state = useState(function () {
      var loaded = loadState();
      if (loaded && loaded.name) {
        var savedDecks = loaded.decks || {};
        var validTopics = { git: true, liver: true, hrt: true, contraception: true, infertility: true, pem: true, menstruation: true };
        var activeTopic = (loaded.activeTopic && validTopics[loaded.activeTopic]) ? loaded.activeTopic : null;
        var stage = (loaded.stage === "deck" && activeTopic) || loaded.stage === "topics" ? loaded.stage : "topics";
        return {
          name: loaded.name,
          stage: stage,
          activeTopic: activeTopic,
          decks: {
            git: reconcileDeck(savedDecks.git, window.GIT_CARDS),
            liver: reconcileDeck(savedDecks.liver, window.LIVER_CARDS),
            hrt: reconcileDeck(savedDecks.hrt, window.HRT_CARDS),
            contraception: reconcileDeck(savedDecks.contraception, window.CONTRACEPTION_CARDS),
            infertility: reconcileDeck(savedDecks.infertility, window.INFERTILITY_CARDS),
            pem: reconcileDeck(savedDecks.pem, window.PEM_CARDS),
            menstruation: reconcileDeck(savedDecks.menstruation, window.MENSTRUATION_CARDS)
          }
        };
      }
      return defaultState();
    });
    var state = _state[0]; var setState = _state[1];
    var rootRef = useRef(null);

    useEffect(function () {
      saveState(state);
    }, [state]);

    function transition(mutate, tintVar) {
      mutate();
    }

    function handleNameSubmit(name) {
      transition(function () {
        setState(function (s) { return Object.assign({}, s, { name: name, stage: "topics" }); });
      }, "--slate");
    }

    function handleSwitchUser() {
      try { window.localStorage.removeItem(STORAGE_KEY); } catch (err) {}
      transition(function () {
        setState(defaultState());
      }, "--slate");
    }

    function handleSelectTopic(topicKey) {
      var tintVar = DECKS[topicKey].colorVar;
      transition(function () {
        setState(function (s) { return Object.assign({}, s, { activeTopic: topicKey, stage: "deck" }); });
      }, tintVar);
    }

    function handleBackToTopics() {
      transition(function () {
        setState(function (s) { return Object.assign({}, s, { stage: "topics" }); });
      }, "--slate");
    }

    function handleUpdateDeck(topicKey, updater) {
      setState(function (s) {
        var nextDecks = Object.assign({}, s.decks);
        nextDecks[topicKey] = updater(s.decks[topicKey]);
        return Object.assign({}, s, { decks: nextDecks });
      });
    }

    var body = null;
    if (state.stage === "name") {
      body = e(NameScreen, { onSubmit: handleNameSubmit });
    } else if (state.stage === "topics") {
      body = e(TopicsScreen, {
        name: state.name,
        state: state,
        onSelectTopic: handleSelectTopic,
        onSwitchUser: handleSwitchUser
      });
    } else if (state.stage === "deck" && state.activeTopic) {
      body = e(DeckScreen, {
        topicKey: state.activeTopic,
        state: state,
        onUpdateDeck: handleUpdateDeck,
        onBack: handleBackToTopics
      });
    }

    return e(
      "div",
      { className: "app-root", ref: rootRef },
      body,
      e("footer", { className: "app-footer" }, "Roundcards \u00B7 built for pharmacy exam prep")
    );
  }

  var rootEl = document.getElementById("root");
  var root = ReactDOM.createRoot(rootEl);
  root.render(e(App, null));
})();

</script>
</body>
