    var masteredCount = Object.keys(deckState.status).filter(function (id) {
      return deckState.status[id] === "mastered";
    }).length;
    var started = deckState.pos > 0 || masteredCount > 0;
    var pct = Math.min(100, Math.round((Math.min(deckState.pos, total) / total) * 100));

    var cardRef = useRef(null);

    function handleEnter() {
      if (typeof gsap === "undefined" || prefersReducedMotion()) return;
      gsap.to(cardRef.current, { y: -4, duration: 0.25, ease: "power2.out" });
    }
    function handleLeave() {
      if (typeof gsap === "undefined" || prefersReducedMotion()) return;
      gsap.to(cardRef.current, { y: 0, duration: 0.3, ease: "power2.out" });
    }

    return e(
      "button",
      {
        ref: cardRef,
        className: "topic-card theme-" + deck.tint,
        onClick: function () { props.onSelect(deck.key); },
        onMouseEnter: handleEnter,
        onMouseLeave: handleLeave
      },
      e("div", { className: "topic-card-top" },
        e("span", { className: "topic-monogram" }, deck.label),
        e("span", { className: "topic-count" }, total + " cards")
      ),
      e("h3", { className: "topic-title" }, deck.title),
      e("p", { className: "topic-subtitle" }, deck.subtitle),
      e("div", { className: "topic-progress-track" },
        e("div", { className: "topic-progress-fill", style: { width: pct + "%" } })
      ),
      e("div", { className: "topic-meta-row" },
        e("span", null, masteredCount + " / " + total + " mastered"),
        e("span", { className: "topic-cta" }, started ? "Continue" : "Start deck", e(IconArrow, null))
      )
    );
  }

  function TopicsScreen(props) {
    var wrapRef = useRef(null);
    useEffect(function () {
      if (typeof gsap === "undefined" || prefersReducedMotion()) return;
      gsap.fromTo(
        wrapRef.current.querySelectorAll(".fade-in-item"),
        { opacity: 0, y: 14 },
        { opacity: 1, y: 0, duration: 0.6, stagger: 0.08, ease: "power3.out" }
      );
    }, []);

    return e(
      "div",
      { className: "screen screen-topics", ref: wrapRef },
      e(
        "div",
        { className: "container" },
        e("div", { className: "topics-header fade-in-item" },
          e("div", null,
            e("p", { className: "eyebrow" }, "Welcome back"),
            e("h1", { className: "display-h2" }, props.name + ".")
          ),
          e("button", { className: "link-btn", onClick: props.onSwitchUser }, "Not you? Switch")
        ),
        e(PulseLine, { speed: 9 }),
        e("p", { className: "section-note fade-in-item" }, "Choose a deck to pick up your rounds."),
        e(
          "div",
          { className: "topics-grid fade-in-item" },
          e(TopicCard, { deck: DECKS.git, deckState: props.state.decks.git, onSelect: props.onSelectTopic }),
          e(TopicCard, { deck: DECKS.liver, deckState: props.state.decks.liver, onSelect: props.onSelectTopic })
        )
      )
    );
  }

  /* ---------------- Deck Screen ---------------- */
  function DeckScreen(props) {
    var deck = DECKS[props.topicKey];
    var deckState = props.state.decks[props.topicKey];
    var byId = useMemo(function () { return cardsById(deck.cards); }, [props.topicKey]);

    var _flipped = useState(false); var flipped = _flipped[0]; var setFlipped = _flipped[1];
    var dirRef = useRef(0);
    var cardOuterRef = useRef(null);
    var cardInnerRef = useRef(null);

    var total = deck.cards.length;
    var isComplete = deckState.pos >= deckState.order.length;
    var currentId = !isComplete ? deckState.order[deckState.pos] : null;
    var currentCard = currentId ? byId[currentId] : null;

    function updateDeck(updater) {
      props.onUpdateDeck(props.topicKey, updater);
    }

    function goNext() {
      if (isComplete) return;
      dirRef.current = 1;
      updateDeck(function (d) {
        var pos = d.pos;
        var n = d.order.length;
        do { pos += 1; } while (d.focusMode && pos < n && d.status[d.order[pos]] === "mastered");
        pos = Math.min(pos, n);
        return Object.assign({}, d, { pos: pos });
      });
      setFlipped(false);
    }

    function goPrev() {
      dirRef.current = -1;
      updateDeck(function (d) {
        var n = d.order.length;
        var pos = d.pos >= n ? n - 1 : d.pos - 1;
        while (d.focusMode && pos > 0 && d.status[d.order[pos]] === "mastered") pos -= 1;
        pos = Math.max(0, pos);
        return Object.assign({}, d, { pos: pos });
      });
      setFlipped(false);
    }

    function doShuffle() {
      dirRef.current = 0;
      updateDeck(function (d) {
        var newOrder = shuffleArray(d.order);
        return Object.assign({}, d, { order: newOrder, pos: 0 });
      });
      setFlipped(false);
    }

    function toggleFlip() {
      if (!currentCard) return;
      var next = !flipped;
      setFlipped(next);
      if (next) {
        updateDeck(function (d) {
          if (d.status[currentId]) return d;
          var status = Object.assign({}, d.status);
          status[currentId] = "seen";
          return Object.assign({}, d, { status: status });
        });
      }
    }

    function toggleMastered() {
      if (!currentCard) return;
      updateDeck(function (d) {
        var cur = d.status[currentId];
        var status = Object.assign({}, d.status);
        status[currentId] = cur === "mastered" ? "seen" : "mastered";
        return Object.assign({}, d, { status: status });
      });
      if (typeof gsap !== "undefined" && !prefersReducedMotion() && cardOuterRef.current) {
        gsap.fromTo(cardOuterRef.current, { scale: 1 }, { scale: 1.025, duration: 0.16, yoyo: true, repeat: 1, ease: "power1.inOut" });
      }
    }

    function toggleFocusMode() {
      dirRef.current = 0;
      updateDeck(function (d) {
        var nextFocus = !d.focusMode;
        var pos = nextFocus ? firstPos(d.order, d.status, true) : d.pos;
        return Object.assign({}, d, { focusMode: nextFocus, pos: pos });
      });
      setFlipped(false);
    }

    function restartDeck(focusOnly) {
      dirRef.current = 0;
      updateDeck(function (d) {
        var pos = focusOnly ? firstPos(d.order, d.status, true) : 0;
        return Object.assign({}, d, { focusMode: !!focusOnly, pos: pos });
      });
      setFlipped(false);
    }

    /* entrance animation on card change */
    useEffect(function () {
      if (!cardOuterRef.current) return;
      if (typeof gsap === "undefined" || prefersReducedMotion()) return;
      var dir = dirRef.current;
      var fromX = dir === 0 ? 0 : dir * 26;
      gsap.fromTo(
        cardOuterRef.current,
        { opacity: dir === 0 ? 1 : 0, x: fromX },
        { opacity: 1, x: 0, duration: 0.38, ease: "power3.out" }
      );
    }, [currentId]);

    /* flip animation */
    useEffect(function () {
      if (!cardInnerRef.current) return;
      if (typeof gsap === "undefined") {
        return;
      }
      if (prefersReducedMotion()) {
        gsap.set(cardInnerRef.current, { rotateY: flipped ? 180 : 0 });
        return;
      }
      gsap.to(cardInnerRef.current, { rotateY: flipped ? 180 : 0, duration: 0.55, ease: "power2.inOut" });
    }, [flipped, currentId]);

    /* keyboard shortcuts */
    useEffect(function () {
      function onKey(ev) {
        if (ev.target && (ev.target.tagName === "INPUT" || ev.target.tagName === "TEXTAREA")) return;
        if (ev.code === "Space") { ev.preventDefault(); toggleFlip(); }
        else if (ev.code === "ArrowRight") { goNext(); }
        else if (ev.code === "ArrowLeft") { goPrev(); }
        else if (ev.key === "s" || ev.key === "S") { doShuffle(); }
        else if (ev.key === "m" || ev.key === "M") { toggleMastered(); }
      }
      window.addEventListener("keydown", onKey);
      return function () { window.removeEventListener("keydown", onKey); };
    });

    /* touch swipe */
    var touchStartX = useRef(null);
    function onTouchStart(ev) { touchStartX.current = ev.touches[0].clientX; }
    function onTouchEnd(ev) {
      if (touchStartX.current === null) return;
      var dx = ev.changedTouches[0].clientX - touchStartX.current;
      if (Math.abs(dx) > 55) {
        if (dx < 0) goNext(); else goPrev();
      }
      touchStartX.current = null;
    }

    var masteredCount = Object.keys(deckState.status).filter(function (id) { return deckState.status[id] === "mastered"; }).length;
    var seenCount = Object.keys(deckState.status).filter(function (id) { return deckState.status[id] === "seen"; }).length;
    var newCount = total - masteredCount - seenCount;
    var unmasteredCount = total - masteredCount;

    var themeClass = "theme-" + deck.tint;

    if (isComplete) {
      return e(
        "div",
        { className: "screen screen-deck " + themeClass },
        e("div", { className: "container container-narrow" },
          e(
            "div",
            { className: "complete-panel" },
            e("span", { className: "eyebrow" }, deck.title),
            e("h2", { className: "display-h2" }, "Deck complete."),
            e("p", { className: "lede" }, "You have been through all " + total + " cards. " + masteredCount + " marked mastered."),
            e("div", { className: "complete-stats" },
              e("div", { className: "stat-pill" }, e("strong", null, masteredCount), " mastered"),
              e("div", { className: "stat-pill" }, e("strong", null, unmasteredCount), " to review"),
              e("div", { className: "stat-pill" }, e("strong", null, total), " total")
            ),
            e("div", { className: "complete-actions" },
              unmasteredCount > 0 ? e("button", { className: "btn btn-primary", onClick: function () { restartDeck(true); } }, "Review unmastered (" + unmasteredCount + ")") : null,
              e("button", { className: "btn", onClick: function () { restartDeck(false); } }, "Restart full deck"),
              e("button", { className: "btn btn-ghost", onClick: props.onBack }, "Back to topics")
            )
          )
        )
      );
    }

    return e(
      "div",
      { className: "screen screen-deck " + themeClass },
      e(
        "div",
        { className: "container" },
        e(
          "div",
          { className: "deck-header" },
          e("button", { className: "link-btn", onClick: props.onBack }, e(IconArrow, { dir: "left" }), " Topics"),
          e("div", { className: "deck-header-title" },
            e("span", { className: "eyebrow" }, deck.subtitle),
            e("h2", { className: "deck-title" }, deck.title)
          ),
          e("span", { className: "deck-counter" }, (deckState.pos + 1) + " / " + total)
        ),
        e(PulseLine, { speed: 6 }),
        e(
          "div",
          { className: "progress-track", "aria-hidden": "true" },
          e("div", { className: "progress-fill", style: { width: Math.round(((deckState.pos) / total) * 100) + "%" } }),
          e("div", { className: "progress-mastered", style: { width: Math.round((masteredCount / total) * 100) + "%" } })
        ),
        e(
          "div",
          { className: "card-stage", onTouchStart: onTouchStart, onTouchEnd: onTouchEnd },
          e(
            "div",
            { className: "card-outer", ref: cardOuterRef },
            e(
              "div",
              { className: "card-inner", ref: cardInnerRef, onClick: toggleFlip, role: "button", tabIndex: 0, "aria-label": "Flip card" },
              e(
                "div",
                { className: "card-face card-front" },
                e("span", { className: "card-eyebrow" }, currentCard.cat),
                e("div", { className: "card-body-wrap" }, renderBody(currentCard.q, "card-question")),
                e("div", { className: "card-hint" }, e(IconArrow, null), " Tap to reveal the answer")
              ),
              e(
                "div",
                { className: "card-face card-back" },
                e("span", { className: "card-eyebrow card-eyebrow-answer" }, "Answer"),
                e("div", { className: "card-body-wrap" }, renderBody(currentCard.a, "card-answer")),
                e("div", { className: "card-hint" }, "Tap to see the question again")
              )
            )
          )
        ),
        e(
          "div",
          { className: "controls-row" },
          e("button", { className: "btn btn-icon", onClick: doShuffle, title: "Shuffle (S)" }, e(IconShuffle, null), e("span", { className: "btn-label" }, "Shuffle")),
          e("button", { className: "btn btn-icon", onClick: goPrev, title: "Previous (\u2190)" }, e(IconArrow, { dir: "left" }), e("span", { className: "btn-label" }, "Prev")),
          e("button", { className: "btn btn-primary btn-flip", onClick: toggleFlip, title: "Flip (space)" }, flipped ? "Show question" : "Reveal answer"),
          e("button", { className: "btn btn-icon", onClick: goNext, title: "Next (\u2192)" }, e("span", { className: "btn-label" }, "Next"), e(IconArrow, null)),
          e(
            "button",
            { className: "btn btn-icon btn-mastered" + ((deckState.status[currentId] === "mastered") ? " is-active" : ""), onClick: toggleMastered, title: "Mark mastered (M)" },
            e(IconCheck, null), e("span", { className: "btn-label" }, "Mastered")
          )
        ),
        e(
          "div",
          { className: "deck-footer" },
          e("label", { className: "focus-toggle" },
            e("input", { type: "checkbox", checked: deckState.focusMode, onChange: toggleFocusMode }),
            e("span", null, "Focus mode \u2014 unmastered only")
          ),
          e("div", { className: "stats-row" },
            e("span", null, newCount + " new"),
            e("span", null, seenCount + " reviewing"),
            e("span", null, masteredCount + " mastered")
          )
        ),
        e("p", { className: "keys-hint" }, "\u2190 \u2192 navigate \u00B7 space flip \u00B7 M master \u00B7 S shuffle")
      )
    );
  }

  /* ---------------- App ---------------- */
  function App() {
    var _state = useState(function () {
      var loaded = loadState();
      if (loaded && loaded.name) {
        var savedDecks = loaded.decks || {};
        var activeTopic = (loaded.activeTopic === "git" || loaded.activeTopic === "liver") ? loaded.activeTopic : null;
        var stage = (loaded.stage === "deck" && activeTopic) || loaded.stage === "topics" ? loaded.stage : "topics";
        return {
          name: loaded.name,
          stage: stage,
          activeTopic: activeTopic,
          decks: {
            git: reconcileDeck(savedDecks.git, window.GIT_CARDS),
            liver: reconcileDeck(savedDecks.liver, window.LIVER_CARDS)
          }
        };
      }
      return defaultState();
    });
    var state = _state[0]; var setState = _state[1];
    var overlayRef = useRef(null);
    var rootRef = useRef(null);

    useEffect(function () {
      saveState(state);
    }, [state]);

    function transition(mutate, tintVar) {
      if (typeof gsap === "undefined" || prefersReducedMotion() || !overlayRef.current) {
        mutate();
        return;
      }
      var el = overlayRef.current;
      if (tintVar) {
        el.style.setProperty("--scan-tint", "var(" + tintVar + ")");
      }
      var tl = gsap.timeline();
      tl.set(el, { xPercent: -130, opacity: 1 })
        .to(el, { xPercent: 0, duration: 0.3, ease: "power2.in" })
        .add(mutate)
        .to(el, { xPercent: 130, duration: 0.42, ease: "power2.out" });
    }

    function handleNameSubmit(name) {
      transition(function () {
        setState(function (s) { return Object.assign({}, s, { name: name, stage: "topics" }); });
      }, "--slate");
    }

    function handleSwitchUser() {
      try { window.localStorage.removeItem(STORAGE_KEY); } catch (err) {}
      transition(function () {
        setState(defaultState());
      }, "--slate");
    }

    function handleSelectTopic(topicKey) {
      var tintVar = DECKS[topicKey].colorVar;
      transition(function () {
        setState(function (s) { return Object.assign({}, s, { activeTopic: topicKey, stage: "deck" }); });
      }, tintVar);
    }

    function handleBackToTopics() {
      transition(function () {
        setState(function (s) { return Object.assign({}, s, { stage: "topics" }); });
      }, "--slate");
    }

    function handleUpdateDeck(topicKey, updater) {
      setState(function (s) {
        var nextDecks = Object.assign({}, s.decks);
        nextDecks[topicKey] = updater(s.decks[topicKey]);
        return Object.assign({}, s, { decks: nextDecks });
      });
    }

    var body = null;
    if (state.stage === "name") {
      body = e(NameScreen, { onSubmit: handleNameSubmit });
    } else if (state.stage === "topics") {
      body = e(TopicsScreen, {
        name: state.name,
        state: state,
        onSelectTopic: handleSelectTopic,
        onSwitchUser: handleSwitchUser
      });
    } else if (state.stage === "deck" && state.activeTopic) {
      body = e(DeckScreen, {
        topicKey: state.activeTopic,
        state: state,
        onUpdateDeck: handleUpdateDeck,
        onBack: handleBackToTopics
      });
    }

    return e(
      "div",
      { className: "app-root", ref: rootRef },
      e("div", { className: "scan-overlay", ref: overlayRef, "aria-hidden": "true" }),
      body,
      e("footer", { className: "app-footer" }, "Roundcards \u00B7 built for pharmacy exam prep")
    );
  }

  var rootEl = document.getElementById("root");
  var root = ReactDOM.createRoot(rootEl);
  root.render(e(App, null));
})();

</script>
